*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── NAV ─────────────────────────────────────────────────── */
.nav{position:fixed;top:0;left:0;bottom:0;width:165px;z-index:200;
background:linear-gradient(180deg,#070f2e 0%,#030919 100%);
border-right:1px solid rgba(42,64,153,.5);display:flex;flex-direction:column;overflow:hidden;}
.nav-top{padding:12px 14px 10px;border-bottom:1px solid rgba(42,64,153,.4);flex-shrink:0;}
.nav-brand{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.nav-icon{width:30px;height:30px;border-radius:7px;overflow:hidden;flex-shrink:0;}
.nav-brand-txt{font:800 10px/1.2 Sora,sans-serif;color:#fff;}
.nav-brand-sub{font:600 8px/1 Sora,sans-serif;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}
.nav-user{display:flex;align-items:center;gap:8px;}
.nav-user-info{font:700 9px/1 Sora,sans-serif;color:rgba(255,255,255,.45);}
.nav-user-name{font:700 12px/1.1 Sora,sans-serif;color:#fff;margin-top:2px;}
.nav-body{flex:1;overflow-y:auto;padding:8px 10px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;border-left:2.5px solid transparent;font:600 11.5px/1 Sora,sans-serif;color:rgba(255,255,255,.45);cursor:pointer;transition:all .15s;margin-bottom:2px;background:transparent;width:100%;text-align:left;border-top:none;border-right:none;border-bottom:none;}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8);}
.nav-item.on{background:rgba(255,255,255,.07);border-left-color:var(--agent);color:#fff;font-weight:700;}
.nav-foot{padding:10px 14px;border-top:1px solid rgba(42,64,153,.4);flex-shrink:0;}
.theme-row{display:flex;gap:5px;margin-bottom:8px;}
.tdot{width:20px;height:20px;border-radius:5px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.tdot.on{border-color:var(--ek-gold);box-shadow:0 0 6px rgba(255,199,44,.6);}
.signout{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;border:1px solid rgba(220,38,38,.3);background:rgba(220,38,38,.1);color:#F87171;font:700 11px Sora,sans-serif;cursor:pointer;width:100%;}

/* ── MAIN ────────────────────────────────────────────────── */
.main{padding-left:165px;min-height:100vh;background:var(--bg);transition:padding-left .22s ease;}
/* Collapsible nav */
.nav{transition:width .22s ease;}
.nav.nc{width:54px!important;}
.nav.nc .nav-top{padding:12px 8px 10px;}
.nav.nc .nav-brand{justify-content:center;margin-bottom:0;gap:0;}
.nav.nc .nav-brand-txt,.nav.nc .nav-brand-sub,.nav.nc .nav-user,.nav.nc .nav-mon,.nav.nc .nav-item span:last-child,.nav.nc .signout span:last-child,.nav.nc .theme-row{display:none;}
.nav.nc .nav-body{padding:8px 6px;}
.nav.nc .nav-item{justify-content:center;padding:9px 0;border-left-width:0;}
.nav.nc .nav-foot{padding:10px 6px;}
.nav.nc .signout{justify-content:center;padding:9px 0;gap:0;}
.main.nc{padding-left:54px!important;}
.topbar{padding:14px 28px;border-bottom:1px solid var(--bsoft);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.eyebrow{font:700 10px/1 Sora,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--agent);}
.page-title{font:italic 800 22px/1.1 Sora,sans-serif;color:var(--text);margin-top:4px;}
.pad{padding:18px 28px;}

/* ── AGENT ROSTER CARD ─────────────────────────────────────── */
.roster-card{border-radius:14px;border:2.5px solid;padding:16px;position:relative;overflow:hidden;transition:transform .15s;}
.roster-card:hover{transform:translateY(-2px);}
.roster-card .you-badge{position:absolute;top:10px;right:10px;font:800 8px/1 Sora,sans-serif;padding:3px 7px;border-radius:4px;background:rgba(255,255,255,.15);color:#fff;letter-spacing:.08em;}
.shift-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:7px;font:700 11px/1 Sora,sans-serif;margin:8px 0;}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:10px;}
.stat-box{background:rgba(0,0,0,.25);border-radius:6px;padding:6px 4px;text-align:center;}
.stat-val{font:800 16px/1 'JetBrains Mono',monospace;}
.stat-lbl{font:700 8px/1 Sora,sans-serif;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;}

/* ── WEEK CALENDAR ─────────────────────────────────────────── */
.week-grid{width:100%;border-collapse:collapse;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;}
.wg-head{background:rgba(0,0,0,.3);padding:8px 6px;text-align:center;font:700 9px/1 Sora,sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bsoft);border-right:1px solid var(--bsoft);}
.wg-head.today{background:rgba(99,102,241,.18);color:var(--text);}
.wg-agent{display:flex;align-items:center;gap:7px;padding:9px 10px;border-bottom:1px solid var(--bsoft);border-right:1px solid var(--bsoft);background:rgba(0,0,0,.2);}
.wg-cell{padding:7px 4px;text-align:center;border-bottom:1px solid var(--bsoft);border-right:1px solid var(--bsoft);font:600 10px/1.3 Sora,sans-serif;}
.wg-cell.today-col{background:rgba(99,102,241,.06);}

/* ── COMPLAINTS TABLE ──────────────────────────────────────── */
.stat-bar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--bsoft);margin-bottom:14px;}
.sbar-item{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-right:1px solid var(--bsoft);}
.sbar-item:last-child{border-right:none;}
.sbar-lbl{font:600 12px/1 Sora,sans-serif;color:var(--text2);}
.sbar-val{font:800 20px/1 'JetBrains Mono',monospace;}
.ctbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
.ctbl thead tr{background:#13205A;}
.ctbl th{padding:9px 10px;text-align:left;font:700 11px/1 Sora,sans-serif;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.9);white-space:nowrap;}
.ctbl td{padding:8px 10px;border-bottom:1px solid var(--bsoft);color:var(--text2);vertical-align:top;}
.ctbl tbody tr{cursor:pointer;}
.ctbl tbody tr:hover td{background:rgba(255,255,255,.03);}
/* Excel-like inline editing */
.xls-cell{cursor:cell;transition:background .1s;}
.xls-cell:hover{background:rgba(255,198,44,.06)!important;}
.xls-cell.xls-active{outline:2px solid #FFC72C;outline-offset:-2px;position:relative;z-index:2;}
.xls-cell.xls-editing{outline:2px solid #60A5FA;outline-offset:-2px;position:relative;z-index:3;padding:0!important;overflow:visible!important;}
.xls-inp,.xls-sel{display:block;width:100%;min-height:28px;border:none;background:rgba(30,58,138,.9);color:#fff;font:700 11px/1.4 'Sora',sans-serif;padding:3px 6px;outline:none;cursor:auto;border-radius:0;}
.xls-inp{resize:none;height:100%;}
.xls-sel{cursor:pointer;}
.xls-hint{font:500 9px 'Sora',sans-serif;color:rgba(255,255,255,.3);display:block;margin-top:1px;}
/* Make table header sticky */
.ctbl thead tr,.tbl thead tr{position:sticky;top:0;z-index:10;background:#13205A;}
/* Constrain the scroll container */
.xls-scroll{max-height:65vh;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;}
.xls-scroll .ctbl{min-width:1180px;}
.xls-scroll::-webkit-scrollbar{height:8px;width:6px;}
.xls-scroll::-webkit-scrollbar-thumb{background:var(--sub);border-radius:4px;}
.ctbl tbody tr.expanded td{background:rgba(99,102,241,.06);}
.ctbl .exp-row td{background:rgba(0,0,0,.2);padding:12px 14px;}
.st-res{color:#22C55E;font:800 11px/1 Sora,sans-serif;}
.st-prg{color:#F59E0B;font:800 11px/1 Sora,sans-serif;}
.st-unr{color:#EF4444;font:800 11px/1 Sora,sans-serif;}
.bu-tag{display:inline-flex;padding:2px 7px;border-radius:4px;font:700 9px/1 'JetBrains Mono',monospace;background:rgba(96,165,250,.15);color:#93C5FD;border:1px solid rgba(96,165,250,.2);}
body[data-theme="solar"] .bu-tag,body[data-theme="solar"] .bu-pill{background:rgba(13,27,69,.10)!important;color:#0D1B45!important;border-color:rgba(13,27,69,.22)!important;}
.cat-main{font:700 11px/1 Sora,sans-serif;color:var(--text);}
.cat-sub{font:500 10px/1.3 Sora,sans-serif;color:var(--muted);margin-top:2px;}

/* ── MISC ──────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:12px;font:700 9px/1 Sora,sans-serif;text-transform:uppercase;letter-spacing:.04em;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
.badge-res{background:var(--okt);color:var(--okb);border:1px solid rgba(74,222,128,.25);}
.badge-prg{background:var(--wnt);color:var(--wnb);border:1px solid rgba(252,211,77,.25);}
.badge-unr{background:var(--bdt);color:var(--bdb);border:1px solid rgba(248,113,113,.28);}
.inp{width:100%;padding:9px 12px;background:rgba(0,0,0,.28);border:1px solid var(--bsoft);border-radius:8px;font:500 12px Sora,sans-serif;color:var(--text);outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--agent);}
.inp::placeholder{color:var(--sub);}
.sel{width:100%;padding:8px 10px;background:rgba(0,0,0,.28);border:1px solid var(--bsoft);border-radius:8px;font:500 11px Sora,sans-serif;color:var(--text);outline:none;}
.lbl{font:700 9px/1 Sora,sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:block;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 13px;border-radius:8px;font:700 11px/1 Sora,sans-serif;cursor:pointer;transition:all .15s;border:1px solid var(--bsoft);background:rgba(255,255,255,.05);color:var(--text);white-space:nowrap;}
.btn:hover{background:rgba(255,255,255,.1);}
.btn-agent{background:var(--agent);color:#0A1A4F;border-color:var(--agent);font-weight:800;box-shadow:0 4px 14px rgba(0,0,0,.25);}
.btn-sm{padding:5px 9px;font-size:10px;}
.card{background:linear-gradient(180deg,var(--card2,#1A2E7A),var(--card,#15276A));border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card-head{padding:11px 16px;border-bottom:1px solid var(--bsoft);display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(0,0,0,.2);}
.card-head h3{font:700 12px/1.2 Sora,sans-serif;color:var(--text);display:flex;align-items:center;gap:7px;}

/* ── LAVENDER: force ALL table text dark ── */
body[data-theme="bright"] .tbl td,
body[data-theme="bright"] .tbl td span,
body[data-theme="bright"] .tbl td a,
body[data-theme="bright"] .tbl-num,
body[data-theme="bright"] .tbl td .tbl-num { color:#1E1B4B !important; }
body[data-theme="bright"] .tbl td * { color:#1E1B4B !important; }
body[data-theme="bright"] .badge-res,
body[data-theme="bright"] .badge-res * { color:#15803D !important; }
body[data-theme="bright"] .badge-prg,
body[data-theme="bright"] .badge-prg * { color:#D97706 !important; }
body[data-theme="bright"] .badge-unr,
body[data-theme="bright"] .badge-unr * { color:#B91C1C !important; }
body[data-theme="bright"] .bu-pill,
body[data-theme="bright"] .bu-pill * { color:#3730A3 !important; }
/* Bright theme: force pure black text throughout main */
body[data-theme="bright"] .main{color:#111!important;background:#F5F5F5!important;}
body[data-theme="bright"] .main .card{background:#fff!important;color:#111!important;}
body[data-theme="bright"] .main .page-header h1{color:#C44F00!important;}
body[data-theme="bright"] .main .page-sub{color:#444!important;}
body[data-theme="bright"] .main [style*="color:#fff"]{color:#111!important;}
body[data-theme="bright"] .main [style*="color:rgba(255,255,255"]{color:#444!important;}
body[data-theme="bright"] .main [style*="color:#E8F0FF"]{color:#111!important;}
body[data-theme="bright"] .main [style*="color:#CBD5E1"]{color:#222!important;}
body[data-theme="bright"] .main [style*="color:#94A3B8"]{color:#555!important;}
body[data-theme="bright"] .main [style*="color:#64748B"]{color:#444!important;}
body[data-theme="bright"] .main [style*="background:#0C1830"]{background:#F0F0F0!important;}
body[data-theme="bright"] .main [style*="background:#1E2A45"]{background:#F0F0F0!important;}
body[data-theme="bright"] .main [style*="rgba(255,255,255,.03)"]{background:rgba(0,0,0,.03)!important;}
body[data-theme="bright"] .main [style*="rgba(255,255,255,.05)"]{background:rgba(0,0,0,.04)!important;}
body[data-theme="bright"] .main input,body[data-theme="bright"] .main select,body[data-theme="bright"] .main textarea{background:#fff!important;border-color:#CCC!important;color:#111!important;}
body[data-theme="bright"] .main table td{color:#111!important;}
body[data-theme="bright"] .main table th{color:#444!important;background:#EBEBEB!important;}
body[data-theme="bright"] .main .btn{background:#EBEBEB!important;border-color:#CCC!important;color:#222!important;}
body[data-theme="bright"] .main .btn-primary,.btn-agent{background:linear-gradient(135deg,#E05C00,#C44F00)!important;color:#fff!important;border-color:#E05C00!important;}
body[data-theme="bright"] .main .badge-res{background:rgba(22,163,74,.15)!important;color:#15803D!important;}
body[data-theme="bright"] .main .badge-prg{background:rgba(217,119,6,.15)!important;color:#B45309!important;}
body[data-theme="bright"] .main .badge-unr{background:rgba(220,38,38,.15)!important;color:#B91C1C!important;}
body[data-theme="bright"] .main text{fill:#111!important;}

.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:linear-gradient(180deg,#070f2e 0%,#030919 100%);border:2px solid #E30613;border-radius:11px;padding:11px 16px;font:700 11.5px Sora,sans-serif;color:#fff;display:flex;align-items:center;gap:9px;box-shadow:0 12px 32px rgba(0,0,0,.5);animation:slideIn .2s ease;}
body[data-theme="bright"] .toast{background:linear-gradient(180deg,#13205A,#0D1B45) !important;color:#fff !important;border-color:#E30613 !important;box-shadow:0 12px 32px rgba(13,27,69,.4) !important;}
body[data-theme="solar"] .toast{background:linear-gradient(180deg,#7A4E12 0%,#52391B 100%) !important;color:#fff !important;border-color:#E30613 !important;}
body[data-theme="night"] .toast{background:linear-gradient(180deg,#0A1220 0%,#030712 100%) !important;border-color:#E30613 !important;}
body[data-theme="green"] .toast{background:linear-gradient(180deg,#0B2414 0%,#020E07 100%) !important;border-color:#E30613 !important;}
body[data-theme="bright"] .toast.err{background:#7F1D1D !important;border-color:#DC2626 !important;color:#fff !important;}
/* Dash-matching strip: mirrors the side nav gradient per theme */
.dashbar{background:linear-gradient(180deg,#070f2e 0%,#030919 100%);color:rgba(255,255,255,.75);}
body[data-theme="bright"] .dashbar{background:linear-gradient(180deg,#13205A,#0D1B45)!important;color:rgba(255,255,255,.75)!important;}
body[data-theme="solar"] .dashbar{background:linear-gradient(180deg,#7A4E12 0%,#52391B 100%)!important;color:rgba(255,255,255,.82)!important;}
body[data-theme="night"] .dashbar{background:linear-gradient(180deg,#0A1220 0%,#030712 100%)!important;}
body[data-theme="green"] .dashbar{background:linear-gradient(180deg,#0B2414 0%,#020E07 100%)!important;}
@keyframes slideIn{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.signin-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,199,44,.06),transparent 60%),var(--bg);}
.signin-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;width:420px;max-width:94vw;}
.agent-pick{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:11px;cursor:pointer;transition:all .15s;}
.agent-pick:hover{border-color:var(--agent);}
.agent-pick.on{border-color:var(--agent);background:var(--agent-tint);}
.wa-box{background:rgba(0,0,0,.25);border:1px solid var(--bsoft);border-radius:9px;padding:13px;font:500 11px/1.6 'JetBrains Mono',monospace;color:var(--text2);white-space:pre-wrap;word-break:break-word;margin:10px 0;}
.mono{font-family:'JetBrains Mono',monospace;}

function _extractDate(txt, r) {

function loadTix(id) {
  try {
    var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
    if (!id) return all;
    var byAgent = all.filter(function (t) {return t.agent === id || t.agentId === id;});
    // Fallback: also load from legacy per-agent key and merge
    try {
      var legacy = JSON.parse(localStorage.getItem('ek_tix_' + id) || '[]');
      if (legacy.length > 0) {
        var byAgentNums = new Set(byAgent.map(function (t) {return String(t.num || '').trim();}));
        var byAgentIds = new Set(byAgent.map(function (t) {return t.id || t.num;}));
        legacy.forEach(function (t) {
          var n = String(t.num || '').trim();
          if (n && byAgentNums.has(n)) return; // same ticket # already in global
          if (byAgentIds.has(t.id || t.num)) return;
          byAgent.push(Object.assign({}, t, { agent: id }));
          if (n) byAgentNums.add(n);
        });
      }
    } catch (e) {}
    // Migrate: backfill loggedAt from ticket ID timestamp for older tickets
    byAgent = byAgent.map(function (t) {
      if (t.loggedAt) return t;
      // ID format: tk_<Date.now()>_<random> — extract the log timestamp
      var m = String(t.id || '').match(/^tk_(\d{10,15})_/);
      if (m) {var ts = parseInt(m[1], 10);if (!isNaN(ts)) return Object.assign({}, t, { loggedAt: new Date(ts).toISOString() });}
      // Fallback: use created date so the ticket is at least visible somewhere
      return Object.assign({}, t, { loggedAt: t.created || t.receivedAt || new Date().toISOString() });
    });
    // Final dedup by ticket number (safety net)
    var seenNums = {};
    return byAgent.filter(function (t) {
      var n = String(t.num || '').trim().toLowerCase();
      if (!n) return true;
      if (seenNums[n]) return false;
      seenNums[n] = true;return true;
    });
  } catch (e) {return [];}
}

// "My Tickets" + Slot Reports are scoped to the duty window via getDutyWindow().
// "All Complaints" shows the full historical store for all agents.
function fmtDay(t) {
  const raw = t.created || t.received || t.receivedAt || t.createdAt || t.date || t.Date || t.dateCreated || t.receivedDate || t.Created || t.loggedAt || t.timestamp || t.Timestamp || '';
  const d = String(raw).slice(0, 10);
  if (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
    const [, m, dd] = d.split('-');
    const mn = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'][parseInt(m, 10) - 1] || '';
    return mn + ' ' + parseInt(dd, 10);
  }
  if (t.day && t.day > 0) {
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
    const mn = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'][now.getMonth()] || '';
    return mn + ' ' + t.day;
  }
  return '—';
}

function dedupTickets(existing, incoming) {

  // - new num → add

        dropped++;return;
      }
      if (result[idx].status !== t.status) {
        result[idx] = Object.assign({}, result[idx], {
          status: t.status,
          note: t.note || result[idx].note,
          resp: t.resp || result[idx].resp

// ── DUTY WINDOW ─────────────────────────────────────────────
// Returns {start, end} as Date objects in WAT
// Mon–Fri: prev day 17:01 → today 17:00
// Saturday: prev Fri 17:01 → today 16:00
// Sunday: prev Sat 16:01 → today 16:00
// Shift-aware duty window rules:
// Saturday   : Fri 17:01 → Sat 16:00
function shiftWatDate(t) {
  var raw = t.created || t.received || t.receivedAt || t.createdAt || t.date || t.Date || t.dateCreated || t.receivedDate || t.Created || t.timestamp || t.Timestamp || '';
  if (!raw || typeof raw === 'number') return null;
  raw = String(raw).trim();if (!raw) return null;
  try {
    var d = new Date(raw);
    if (isNaN(d.getTime())) {
      var dm = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (dm) d = new Date(dm[3] + '-' + dm[1].padStart(2, '0') + '-' + dm[2].padStart(2, '0'));
      if (isNaN(d.getTime())) return null;
    }
    var wat = new Date(d.toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
    return wat.getFullYear() + '-' + String(wat.getMonth() + 1).padStart(2, '0') + '-' + String(wat.getDate()).padStart(2, '0');
  } catch (e) {return null;}
}
function shiftWatYM(t) {var d = shiftWatDate(t);return d ? d.slice(0, 7) : null;}
// Shift schedule (WAT):
// Saturday   : Fri 17:01 → Sat 16:00
// Sunday     : Sat 16:01 → Sun 16:00
// Monday     : Sun 16:01 → Mon 17:00
// Tue–Fri    : prev day 17:01 → today 17:00  (5:01 PM counts as next day)
function getDutyWindow(agentShift) {
  var now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
  var dow = now.getDay(); // 0=Sun,1=Mon…6=Sat
  var todayBase = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var start, end;
  if (dow === 6) {// Saturday: Fri 17:01 → Sat 16:00
    var fri = new Date(todayBase);fri.setDate(fri.getDate() - 1);
    start = new Date(fri.getFullYear(), fri.getMonth(), fri.getDate(), 17, 1, 0);
    end = new Date(todayBase.getFullYear(), todayBase.getMonth(), todayBase.getDate(), 16, 0, 0);
  } else if (dow === 0) {// Sunday: Sat 16:01 → Sun 16:00
    var sat = new Date(todayBase);sat.setDate(sat.getDate() - 1);
    start = new Date(sat.getFullYear(), sat.getMonth(), sat.getDate(), 16, 1, 0);
    end = new Date(todayBase.getFullYear(), todayBase.getMonth(), todayBase.getDate(), 16, 0, 0);
  } else if (dow === 1) {// Monday: Sun 16:01 → Mon 17:00
    var sun = new Date(todayBase);sun.setDate(sun.getDate() - 1);
    start = new Date(sun.getFullYear(), sun.getMonth(), sun.getDate(), 16, 1, 0);
    end = new Date(todayBase.getFullYear(), todayBase.getMonth(), todayBase.getDate(), 17, 0, 0);
  } else {// Tue–Fri: prev day 17:01 → today 17:00
    var prev = new Date(todayBase);prev.setDate(prev.getDate() - 1);
    start = new Date(prev.getFullYear(), prev.getMonth(), prev.getDate(), 17, 1, 0);
    end = new Date(todayBase.getFullYear(), todayBase.getMonth(), todayBase.getDate(), 17, 0, 0);
  }
  return { start: start, end: end };
}
function inDutyWindow(t, agentShift) {
  var w = getDutyWindow(agentShift);
  // Use loggedAt (when agent captured it) if present; fall back to created/receivedAt
  var d = new Date(t.loggedAt || t.created || t.receivedAt || '');
  if (isNaN(d.getTime())) return false;
  var watD = new Date(d.toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
  return watD >= w.start && watD <= w.end;
}
function fmtDutyWindow(agentShift) {
  var w = getDutyWindow(agentShift);
  var opts = { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'Africa/Lagos' };
  return w.start.toLocaleString('en-GB', opts) + ' → ' + w.end.toLocaleString('en-GB', opts);
}

function MyTickets({ agent, tickets, allTix, onEdit, onUpdate, onDelete, showToast, agentShift }) {

  function getEdit(t) {
    const e = editState[t.id] || {};
    return { category: e.category !== undefined ? e.category : t.category || t.issue || '', resp: e.resp !== undefined ? e.resp : t.resp || '', status: e.status !== undefined ? e.status : t.status || 'unresolved', note: e.note !== undefined ? e.note : t.note || '', issue: e.issue !== undefined ? e.issue : t.issue || '' };
  }
  function setEdit(id, k, v) {setEditState(function (s) {return Object.assign({}, s, { [id]: Object.assign({}, s[id] || {}, { [k]: v }) });});}
  function toggleExpand(t) {setExpanded(function (cur) {return cur === t.id ? null : t.id;});}
  function saveUpdate(t) {
    const e = getEdit(t);
    const updated = Object.assign({}, t, { category: e.category, issue: e.issue || e.category, resp: e.resp, status: e.status, note: e.note, updatedBy: agent.id, updatedAt: new Date().toISOString() });
    if (e.status === 'resolved' && !updated.resolvedDate) updated.resolvedDate = new Date().toISOString().slice(0, 10);
    onUpdate && onUpdate(updated);
    setEditState(function (s) {const n = Object.assign({}, s);delete n[t.id];return n;});

  }
  function handleDelete(t) {
    if (window.confirm('Delete ticket #' + t.num + '? This cannot be undone.')) {onDelete && onDelete(t.id);}
  }

  // Deduplicate by ticket number before any filtering
  const seenNums = {};
  const uniqueTix = tickets.filter(function (t) {var n = String(t.num || '').trim().toLowerCase();if (!n) return true;if (seenNums[n]) return false;seenNums[n] = true;return true;});
  const dutyTix = uniqueTix.filter(function (t) {return inDutyWindow(t, agentShift);});

  const phoneFreq = {};const meterFreq = {};
  uniqueTix.forEach(function (t) {const p = String(t.phone || '').trim();const m = String(t.meter || '').trim();if (p) phoneFreq[p] = (phoneFreq[p] || 0) + 1;if (m && m !== '0') meterFreq[m] = (meterFreq[m] || 0) + 1;});
  function repeatCount(t) {const p = String(t.phone || '').trim();const m = String(t.meter || '').trim();const pc = phoneFreq[p] || 0;const mc = meterFreq[m] && m !== '0' ? meterFreq[m] : 0;return Math.max(pc, mc);}
  function isRepeat(t) {return repeatCount(t) > 1;}
  const repeatTotal = dutyTix.filter(isRepeat).length;
  const filt = dutyTix.filter(function (t) {
    if (fSt !== 'all' && t.status !== fSt) return false;
    if (search) {const q = search.toLowerCase();return (t.num + t.name + t.phone + t.bu + (t.category || t.issue || '') + t.addr).toLowerCase().includes(q);}
    return true;
  }).slice().reverse();

  const res = filt.filter(function (t) {return t.status === 'resolved';}).length;
  const prg = filt.filter(function (t) {return t.status === 'progress';}).length;

              <div><label className="lbl">Customer Name</label><input className="inp" value={form.name} onChange={function (e) {setF('name', e.target.value);}} placeholder="Full name" /></div>
              <div><label className="lbl">Phone</label><input className="inp" type="tel" value={form.phone} onChange={function (e) {setF('phone', e.target.value);}} placeholder="+234…" /></div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 10 }}>
              <div><label className="lbl">Meter / Account #</label><input className="inp" value={form.meter} onChange={function (e) {setF('meter', e.target.value);}} placeholder="Meter number" /></div>
              <div><label className="lbl">Business Unit</label><select className="sel" value={form.bu} onChange={function (e) {setF('bu', e.target.value);}}>{BUS.map(function (b) {return <option key={b} value={b}>{b}</option>;})}</select></div>
              <div><label className="lbl">Responsible</label><select className="sel" value={form.resp} onChange={function (e) {setF('resp', e.target.value);}}>{RESP_LIST.map(function (r) {return <option key={r} value={r}>{r.split(' ')[0]}</option>;})}</select></div>
            </div>
            {/* FIX-BUG3: Complaint Date — defaults to today, change if logging a missed/backdated ticket */}
            <div style={{ marginBottom: 10, background: 'rgba(255,199,44,.06)', border: '1px solid rgba(255,199,44,.18)', borderRadius: 8, padding: '8px 12px', display: 'flex', alignItems: 'center', gap: 12 }}>
              <span style={{ font: '700 11px Sora,sans-serif', color: 'var(--muted)', flexShrink: 0 }}>📅 Complaint Date</span>
              <input className="inp" type="date" value={form.complaintDate || watNow.toISOString().slice(0, 10)} onChange={function (e) {setF('complaintDate', e.target.value);}} style={{ maxWidth: 160, margin: 0 }} />
              <span style={{ font: '500 10px Sora,sans-serif', color: 'var(--muted)' }}>Change this if the complaint is from a previous day</span>
            </div>
            <div style={{ marginBottom: 10 }}><label className="lbl">Address</label><input className="inp" value={form.addr} onChange={function (e) {setF('addr', e.target.value);}} placeholder="Street address" /></div>
            <div style={{ marginBottom: 10 }}><label className="lbl">Complaint / Issue</label><textarea className="inp" rows={3} value={form.issue} onChange={function (e) {setF('issue', e.target.value);}} placeholder="Describe the complaint…" style={{ resize: 'vertical' }} /></div>
            <div style={{ marginBottom: 14 }}><label className="lbl">Action Taken</label><textarea className="inp" rows={2} value={form.note} onChange={function (e) {setF('note', e.target.value);}} placeholder="Leave blank if pending." style={{ resize: 'vertical' }} /></div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button type="submit" style={{ flex: 1, padding: '10px', background: agent.color, color: '#0A1A4F', border: 'none', borderRadius: 8, font: '800 13px Sora,sans-serif', cursor: 'pointer' }}>➕ Add to my tickets</button>
              <button type="button" onClick={clearAll} style={{ padding: '10px 16px', background: 'transparent', border: '1px solid var(--bsoft)', borderRadius: 8, color: 'var(--muted)', font: '700 12px Sora,sans-serif', cursor: 'pointer' }}>Clear</button>
            </div>
          </form>}
        {/* Bottom category reference removed — Quick Guide on top serves this purpose */}
      </div>
    </div>);

}

// ── SLOT REPORT ──────────────────────────────────────────────
function SlotReport({ agent, tickets, showToast, agentShift }) {
  const watNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
  const isWeekend = watNow.getDay() === 0 || watNow.getDay() === 6;
  const nowMin = watNow.getHours() * 60 + watNow.getMinutes();
  const todayStr = watNow.toISOString().slice(0, 10);

  // Custom day pick: '' = use today/duty window, 'YYYY-MM-DD' = filter that calendar day
  const [pickedDate, setPickedDate] = useState('');
  const useCustom = pickedDate !== '';

  // Resolved date string for display
  const reportDate = useCustom ? new Date(pickedDate + 'T12:00:00') : watNow;
  const dateStr = reportDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // 4 fixed slots — weekend and weekday are always shown; NOW badge marks the active one
  const SLOTS = [
  { id: 'w1pm', label: 'Weekend 1PM', sub: 'Weekends only', emoji: '🌤️', t: 13 * 60, weekend: true },
  { id: 'wd2pm', label: 'Weekday 2PM', sub: 'Weekdays only', emoji: '🌤️', t: 14 * 60, weekend: false },
  { id: 'w4pm', label: 'Weekend COB 4PM', sub: 'Weekends only', emoji: '🌆', t: 16 * 60, weekend: true },
  { id: 'wd5pm', label: 'Weekday COB 5PM', sub: 'Weekdays only', emoji: '🌆', t: 17 * 60, weekend: false }];


  // NOW = relevant slot whose window (±90 min) contains current time, else next upcoming relevant slot
  const rel = SLOTS.filter(function (s) {return s.weekend === isWeekend;});
  const nowSlot = function () {
    const near = rel.find(function (s) {return Math.abs(s.t - nowMin) <= 90;});
    if (near) return near.id;
    const next = rel.find(function (s) {return s.t > nowMin;});
    return next ? next.id : (rel[rel.length - 1] || SLOTS[0]).id;
  }();

  const [slot, setSlot] = useState(nowSlot);
  const s = SLOTS.find(function (x) {return x.id === slot;}) || SLOTS[0];

  // Filter tickets: custom day = any ticket whose created date matches pickedDate; today = duty window
  const todayTix = useCustom ?
  tickets.filter(function (t) {return (t.created || t.receivedAt || '').slice(0, 10) === pickedDate;}) :
  tickets.filter(function (t) {return inDutyWindow(t, agentShift);});
  const resTix = todayTix.filter(function (t) {return t.status === 'resolved';});
  const prgTix = todayTix.filter(function (t) {return t.status === 'progress';});
  const unrTix = todayTix.filter(function (t) {return t.status === 'unresolved';});
  const rate = todayTix.length ? Math.round(resTix.length / todayTix.length * 100) : 0;

  const msg = [
  s.emoji + ' *' + s.label + ' — EKEDP CX*',
  '📅 ' + dateStr,
  '👤 ' + agent.name + ' | CX Agent',
  '',
  '📊 *Today\'s Ticket Summary:*',
  '• Total Received Today: *' + todayTix.length + '*',
  '• Resolved: *' + resTix.length + '*',
  '• In Progress: *' + prgTix.length + '*',
  '• Unresolved: *' + unrTix.length + '*',
  '• Resolution Rate: *' + rate + '%*',
  '',
  unrTix.length > 0 ? '🔴 *' + unrTix.length + ' ticket' + (unrTix.length > 1 ? 's' : '') + ' still need action.*' : '✅ *All today\'s tickets resolved!*',
  '',
  '📱 EKEDP Power App — Reporting Tool'].
  join('\n');

  function copyMsg() {
    navigator.clipboard.writeText(msg).
    then(function () {(showToast || alert)('Copied! Paste into WhatsApp.');}).
    catch(function () {(showToast || alert)('Copy failed — try selecting text manually.', 'error');});
  }

  function doPDF() {
    function tRow(t, i) {
      return '<tr style="background:' + (i % 2 === 0 ? '#fff' : '#f8fafc') + '">' +
      '<td style="padding:6px 8px;font-size:11px;color:#94A3B8">' + (i + 1) + '</td>' +
      '<td style="padding:6px 8px;font-family:monospace;font-weight:700;color:#1D4ED8">#' + t.num + '</td>' +
      '<td style="padding:6px 8px;font-size:11px">' + t.time + '</td>' +
      '<td style="padding:6px 8px;font-weight:600;font-size:12px">' + t.name + '</td>' +
      '<td style="padding:6px 8px;font-size:11px;font-family:monospace">' + t.phone + '</td>' +
      '<td style="padding:6px 8px;font-size:11px;font-family:monospace">' + (t.meter || '—') + '</td>' +
      '<td style="padding:6px 8px;font-size:11px"><span style="background:#E0F2FE;color:#0369A1;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700">' + t.bu + '</span></td>' +
      '<td style="padding:6px 8px;font-size:11px">' + t.issue + '</td>' +
      '<td style="padding:6px 8px;font-size:11px;color:#64748B">' + (t.note || '—') + '</td>' +
      '</tr>';
    }
    function section(list, color, label, icon) {
      if (!list.length) return '<p style="font-size:12px;color:#94A3B8;padding:10px 0">None.</p>';
      return '<table style="width:100%;border-collapse:collapse;font-size:12px;font-family:Sora,sans-serif">' +
      '<thead><tr style="background:#1E293B;color:#fff">' +
      '<th style="padding:7px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">#</th>' +
      '<th style="padding:7px 8px;text-align:left;font-size:10px">Ticket</th>' +
      '<th style="padding:7px 8px;text-align:left;font-size:10px">Time</th>' +
      '<th style="padding:7px 8px;text-align:left;font-size:10px">Customer</th>' +
      '<th style="padding:7px 8px;text-align:left;font-size:10px">Phone</th>' +
      '<th style="padding:7px 8px;text-align:left;font-size:10px">Meter #</th>' +
      '<th style="padding:7px 8px;text-align:left;font-size:10px">BU</th>' +
      '<th style="padding:7px 8px;text-align:left;font-size:10px">Category</th>' +
      '<th style="padding:7px 8px;text-align:left;font-size:10px">Note</th>' +
      '</tr></thead><tbody>' + list.map(tRow).join('') + '</tbody></table>';
    }
    const html = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
    '<title>EKEDP ' + s.label + ' Report</title>' +
    '<style>@import url("https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap");' +
    '*{box-sizing:border-box;margin:0;padding:0}' +
    'body{font-family:Sora,sans-serif;background:#fff;color:#1E293B}' +
    '@media print{@page{size:A4 landscape;margin:12mm}body{-webkit-print-color-adjust:exact}}' +
    '</style></head><body>' +
    '<div style="background:linear-gradient(135deg,#1D4ED8,#0F172A);color:#fff;padding:20px 28px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;gap:16px">' +
    '<div style="width:48px;height:48px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px">' + s.emoji + '</div>' +
    '<div><div style="font-size:18px;font-weight:800">EKEDP Power App — ' + s.label + '</div>' +
    '<div style="font-size:12px;opacity:.8;margin-top:4px">' + agent.name + ' · ' + dateStr + '</div></div></div>' +
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">' +
    [['TOTAL', todayTix.length, '#3B82F6'], ['RESOLVED', resTix.length, '#22C55E'], ['IN PROGRESS', prgTix.length, '#F59E0B'], ['UNRESOLVED', unrTix.length, '#EF4444']].map(function (k) {return '<div style="border:1px solid #E2E8F0;border-top:3px solid ' + k[2] + ';border-radius:8px;padding:14px 16px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#94A3B8">' + k[0] + '</div><div style="font-size:28px;font-weight:800;font-family:monospace;color:' + k[2] + ';margin-top:4px">' + k[1] + '</div></div>';}).join('') +
    '</div>' +
    '<div style="margin-bottom:18px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#22C55E;margin-bottom:8px;display:flex;align-items:center;gap:6px"><span>✅</span> RESOLVED — ' + resTix.length + ' TICKETS</div>' + section(resTix, '#22C55E', 'Resolved', '✅') + '</div>' +
    '<div style="margin-bottom:18px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#F59E0B;margin-bottom:8px;display:flex;align-items:center;gap:6px"><span>⏳</span> IN PROGRESS — ' + prgTix.length + ' TICKETS</div>' + section(prgTix, '#F59E0B', 'In Progress', '⏳') + '</div>' +
    '<div style="margin-bottom:18px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#EF4444;margin-bottom:8px;display:flex;align-items:center;gap:6px"><span>🔴</span> UNRESOLVED — ' + unrTix.length + ' TICKETS</div>' + section(unrTix, '#EF4444', 'Unresolved', '🔴') + '</div>' +
    '<div style="font-size:10px;color:#94A3B8;text-align:center;padding-top:16px;border-top:1px solid #E2E8F0">EKEDP Power App · Agents Hub · ' + agent.name + ' · Marina HQ · ' + s.label + ' · ' + dateStr + '</div>' +
    '</body></html>';
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
  }

  function doExcel() {
    if (typeof XLSX === 'undefined') {(showToast || alert)('Excel library not loaded yet — try again in a moment.', 'error');return;}
    const wb = XLSX.utils.book_new();
    const H = ['Ticket #', 'Time', 'Customer', 'Phone', 'Meter #', 'BU', 'Category / Issue', 'Status', 'Note'];
    function makeSheet(list, name) {
      const ws = XLSX.utils.aoa_to_sheet([
      ['EKEDP Power App — ' + s.label], ['Agent: ' + agent.name], ['Date: ' + dateStr], [''], H,
      ...list.map(function (t) {return [t.num, t.time, t.name, t.phone, t.meter || '', t.bu, t.issue, t.status, t.note || ''];})]
      );
      ws['!cols'] = [10, 8, 22, 14, 14, 10, 26, 12, 30].map(function (w) {return { wch: w };});
      XLSX.utils.book_append_sheet(wb, ws, name.slice(0, 31));
    }
    makeSheet(todayTix, 'All');
    makeSheet(resTix, 'Resolved');
    makeSheet(prgTix, 'In Progress');
    makeSheet(unrTix, 'Unresolved');
    XLSX.writeFile(wb, 'EKEDP_' + agent.id + '_' + s.id + '_' + todayStr + '.xlsx');
    (showToast || alert)('Excel exported — 4 sheets.');
  }

  return (
    <div>
      <div className="topbar">
        <div>
          <div className="eyebrow">SLOT REPORTS</div>
          <div className="page-title">Slot Reports</div>
          <div style={{ font: '500 11px Sora,sans-serif', color: 'var(--muted)', marginTop: 4 }}>Generate WhatsApp updates and PDF reports for your shift slot</div>
        </div>
        <LiveClock />
      </div>
      <div className="pad">
        {/* ── Custom day picker ── */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, padding: '12px 16px', background: 'rgba(255,255,255,.04)', border: '1px solid var(--bsoft)', borderRadius: 12, flexWrap: 'wrap' }}>
          <span style={{ font: '700 11px Sora,sans-serif', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.08em' }}>📅 Report Date</span>
          <input type="date" value={pickedDate} max={todayStr}
          onChange={function (e) {setPickedDate(e.target.value);}}
          style={{ padding: '7px 12px', borderRadius: 8, border: '1.5px solid ' + (useCustom ? 'var(--agent)' : 'var(--bsoft)'), background: 'var(--bg2)', color: 'var(--text)', font: '600 13px Sora,sans-serif', cursor: 'pointer' }} />
          {useCustom && <button onClick={function () {setPickedDate('');}} style={{ padding: '6px 14px', borderRadius: 8, border: '1px solid var(--bsoft)', background: 'transparent', color: 'var(--muted)', font: '600 11px Sora,sans-serif', cursor: 'pointer' }}>✕ Today</button>}
          <span style={{ font: '500 11px Sora,sans-serif', color: useCustom ? 'var(--agent)' : 'var(--muted)', marginLeft: 'auto' }}>
            {useCustom ? 'Showing: ' + dateStr : 'Showing today\'s duty window'}
          </span>
        </div>
        {/* ── Slot tabs ── */}
        <div style={{ display: 'flex', gap: 10, marginBottom: 18, flexWrap: 'wrap' }}>
          {SLOTS.map(function (sv) {
            const isNow = sv.id === nowSlot;
            const isActive = sv.id === slot;
            return (
              <button key={sv.id} onClick={function () {setSlot(sv.id);}} style={{
                padding: '12px 16px', borderRadius: 11, minWidth: 148, textAlign: 'left',
                border: '1.5px solid ' + (isActive ? agent.color : 'var(--bsoft)'),
                background: isActive ? agent.tint : 'rgba(255,255,255,.03)',
                color: 'var(--text)', cursor: 'pointer', position: 'relative'
              }}>
                {isNow && <span style={{ position: 'absolute', top: -9, left: 10, background: '#F59E0B', color: '#0A1A4F', font: '800 9px Sora,sans-serif', padding: '2px 8px', borderRadius: 20, letterSpacing: '.05em', textTransform: 'uppercase' }}>NOW</span>}
                <div style={{ font: '700 13px Sora,sans-serif', color: isActive ? agent.color : 'var(--text)', marginBottom: 3 }}>{sv.emoji} {sv.label}</div>
                <div style={{ font: '500 10px Sora,sans-serif', color: 'var(--muted)' }}>{sv.sub}</div>
              </button>);

          })}
        </div>

        {/* ── Stats ── */}
        <div className="stat-bar" style={{ marginBottom: 18 }}>
          {[{ l: 'TOTAL', v: todayTix.length, c: 'var(--text)' }, { l: 'RESOLVED', v: resTix.length, c: '#22C55E' }, { l: 'IN PROGRESS', v: prgTix.length, c: '#F59E0B' }, { l: 'UNRESOLVED', v: unrTix.length, c: '#EF4444' }].map(function (k) {return (
              <div key={k.l} className="sbar-item"><span className="sbar-lbl">{k.l}</span><span className="sbar-val" style={{ color: k.c, fontSize: 26 }}>{k.v}</span></div>);
          })}
        </div>

        {/* ── Action cards (3 only — no Email GMs) ── */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 18 }}>
          <button onClick={doPDF} style={{ padding: '20px 16px', background: '#DC2626', color: '#fff', border: 'none', borderRadius: 12, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, transition: 'opacity .15s' }} onMouseEnter={function (e) {e.currentTarget.style.opacity = '.85';}} onMouseLeave={function (e) {e.currentTarget.style.opacity = '1';}}>
            <span style={{ fontSize: 26 }}>📄</span>
            <span style={{ font: '800 13px Sora,sans-serif' }}>PDF Report</span>
            <span style={{ font: '500 10px Sora,sans-serif', opacity: .8 }}>Print / Save as PDF</span>
          </button>
          <button onClick={copyMsg} style={{ padding: '20px 16px', background: '#16A34A', color: '#fff', border: 'none', borderRadius: 12, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, transition: 'opacity .15s' }} onMouseEnter={function (e) {e.currentTarget.style.opacity = '.85';}} onMouseLeave={function (e) {e.currentTarget.style.opacity = '1';}}>
            <span style={{ fontSize: 26 }}>💬</span>
            <span style={{ font: '800 13px Sora,sans-serif' }}>WhatsApp Copy</span>
            <span style={{ font: '500 10px Sora,sans-serif', opacity: .8 }}>Copy message text</span>
          </button>
          <button onClick={doExcel} style={{ padding: '20px 16px', background: '#059669', color: '#fff', border: 'none', borderRadius: 12, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, transition: 'opacity .15s' }} onMouseEnter={function (e) {e.currentTarget.style.opacity = '.85';}} onMouseLeave={function (e) {e.currentTarget.style.opacity = '1';}}>
            <span style={{ fontSize: 26 }}>📊</span>
            <span style={{ font: '800 13px Sora,sans-serif' }}>Excel Export</span>
            <span style={{ font: '500 10px Sora,sans-serif', opacity: .8 }}>4 sheets</span>
          </button>
        </div>

        {/* ── Slot summary insight card ── */}
        <div className="card" style={{ overflow: 'hidden' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0 }}>
            {/* left: resolution rate visual */}
            <div style={{ padding: '20px 22px', borderRight: '1px solid var(--bsoft)' }}>
              <div style={{ font: '700 11px Sora,sans-serif', color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 14 }}>Resolution Rate</div>
              <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 12 }}>
                <svg width="90" height="90" viewBox="0 0 90 90">
                  <circle cx="45" cy="45" r="36" fill="none" stroke="var(--bsoft)" strokeWidth="8" />
                  <circle cx="45" cy="45" r="36" fill="none" stroke={resTix.length === todayTix.length && todayTix.length > 0 ? '#22C55E' : resTix.length > 0 ? '#F59E0B' : 'var(--bsoft)'}
                  strokeWidth="8" strokeLinecap="round"
                  strokeDasharray={2 * Math.PI * 36}
                  strokeDashoffset={2 * Math.PI * 36 * (1 - (todayTix.length > 0 ? resTix.length / todayTix.length : 0))}
                  transform="rotate(-90 45 45)"
                  style={{ transition: 'stroke-dashoffset .6s ease' }} />
                  
                  <text x="45" y="50" textAnchor="middle" style={{ font: '800 16px Sora,sans-serif', fill: 'var(--text1)' }}>{todayTix.length > 0 ? Math.round(resTix.length / todayTix.length * 100) : 0}%</text>
                </svg>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', font: '600 11px Sora,sans-serif' }}>
                <span style={{ color: '#22C55E' }}>✅ {resTix.length} resolved</span>
                <span style={{ color: '#EF4444' }}>⏳ {unrTix.length} open</span>
              </div>
            </div>
            {/* right: quick tips */}
            <div style={{ padding: '20px 22px' }}>
              <div style={{ font: '700 11px Sora,sans-serif', color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Slot Checklist</div>
              {[
              { done: todayTix.length > 0, label: 'Tickets logged today' },
              { done: resTix.length === todayTix.length && todayTix.length > 0, label: 'All tickets resolved' },
              { done: prgTix.length === 0, label: 'No in-progress backlog' },
              { done: unrTix.length === 0, label: 'Zero unresolved tickets' }].
              map(function (item, i) {return (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 9, font: '600 12px Sora,sans-serif', color: item.done ? 'var(--text1)' : 'var(--text2)', opacity: item.done ? 1 : .6 }}>
                  <span style={{ width: 18, height: 18, borderRadius: '50%', background: item.done ? '#22C55E' : 'var(--bsoft)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, flexShrink: 0, color: '#fff', fontWeight: 900 }}>
                    {item.done ? '✓' : '–'}
                  </span>
                  {item.label}
                </div>);
              })}
              <div style={{ marginTop: 14, padding: '8px 10px', background: 'rgba(var(--agent-rgb,99,102,241),.08)', borderRadius: 8, font: '600 10px Sora,sans-serif', color: 'var(--text2)', borderLeft: '3px solid var(--agent)' }}>
                💡 Use <b>WhatsApp Copy</b> above to send this slot's summary to your team group.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>);

}

// ── IMPORT JSON ──────────────────────────────────────────────
function ImportJSON({ agent, tickets, setTickets, showToast }) {
  const [dragging, setDragging] = useState(false);
  const [preview, setPreview] = useState(null);
  const fileRef = useRef(null);
  function processFile(file) {
    const reader = new FileReader();
    reader.onload = function (e) {
      try {
        const data = JSON.parse(e.target.result);

        let imported = [];
        if (Array.isArray(data)) {imported = data;} else
        if (Array.isArray(data.tickets)) {imported = data.tickets;} else
        if (Array.isArray(data.days)) {data.days.forEach(function (day) {(day.tickets || []).forEach(function (t) {imported.push(t);});});} else
        {Object.keys(data).forEach(function (k) {if (k.charAt(0) !== '_' && Array.isArray(data[k])) data[k].forEach(function (t) {imported.push(t);});});}
        if (!imported.length) throw new Error('No tickets found');
        setPreview({ count: imported.length, by: data.exportedBy, tickets: imported });
      } catch (err) {showToast('Invalid JSON: ' + err.message, 'error');}
    };reader.readAsText(file);
  }
  function confirmImport() {
    if (!preview) return;
    // Dedup strictly by ticket number — IDs differ between exports so num is the only reliable key
    const existingNums = new Set(tickets.map(function (t) {return String(t.num || '');}));
    // For existing tickets, update status/note/resp/category if incoming has newer data
    const incomingByNum = {};
    preview.tickets.forEach(function (t) {if (t.num) incomingByNum[String(t.num)] = t;});
    const updated = [];
    const updatedNums = new Set();
    tickets.forEach(function (t) {
      const inc = incomingByNum[String(t.num || '')];
      if (inc) {
        updatedNums.add(String(t.num));
        updated.push(Object.assign({}, t, {
          status: inc.status || t.status,
          note: inc.note || t.note,
          resp: inc.resp || t.resp,
          category: inc.category || t.category,
          issue: inc.issue || t.issue,
          agent: inc.agent || t.agent,
          day: inc.day || t.day,
          updatedAt: inc.updatedAt || t.updatedAt
        }));
      } else {
        updated.push(t);
      }
    });
    const brandNew = preview.tickets.filter(function (t) {return !existingNums.has(String(t.num || ''));});
    const merged = [...updated, ...brandNew];
    // Write to shared global store so all agents see imported tickets
    try {localStorage.setItem('ek_v2_tickets', JSON.stringify(merged));} catch (e) {}
    setTickets(merged);
    showToast('✓ ' + brandNew.length + ' new · ' + updatedNums.size + ' updated · ' + (preview.tickets.length - brandNew.length - updatedNums.size) + ' skipped.');
    setPreview(null);
  }
  return (
    <div>
      <div className="topbar"><div><div className="eyebrow">IMPORT JSON</div><div className="page-title">Import Ticket Export</div></div></div>
      <div className="pad">
        <div onDragOver={function (e) {e.preventDefault();setDragging(true);}} onDragLeave={function () {setDragging(false);}}
        onDrop={function (e) {e.preventDefault();setDragging(false);const f = e.dataTransfer.files[0];if (f) processFile(f);}}
        onClick={function () {fileRef.current && fileRef.current.click();}}
        style={{ border: '2px dashed ' + (dragging ? agent.color : 'var(--bsoft)'), borderRadius: 13, padding: '40px 24px', textAlign: 'center', background: dragging ? agent.tint : 'rgba(0,0,0,.1)', cursor: 'pointer', marginBottom: 14 }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>📂</div>
          <div style={{ font: '700 13px/1 Sora,sans-serif', color: 'var(--text)', marginBottom: 5 }}>Drop your JSON file here or click to browse</div>
          <div style={{ font: '500 11px Sora,sans-serif', color: 'var(--muted)' }}>Accepts <code>ekedp_agent_*.json</code></div>
          <input ref={fileRef} type="file" accept=".json" style={{ display: 'none' }} onChange={function (e) {const f = e.target.files[0];if (f) processFile(f);}} />
        </div>
        {preview && <div className="card">
          <div className="card-head"><h3>✓ {preview.count} tickets loaded</h3><button className="btn-agent btn btn-sm" onClick={confirmImport}>Import →</button></div>
          <div style={{ padding: 14 }}>
            {preview.by && <div style={{ marginBottom: 10, font: '600 12px Sora,sans-serif', color: 'var(--text)' }}>From: <b>{preview.by.name}</b></div>}
            <div style={{ overflowX: 'auto', maxHeight: 240, overflowY: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
                <thead><tr style={{ background: 'rgba(0,0,0,.4)' }}>{['#', 'Ticket', 'Customer', 'BU', 'Status'].map(function (h) {return <th key={h} style={{ padding: '6px 8px', textAlign: 'left', font: '700 9px/1 Sora,sans-serif', color: 'rgba(255,255,255,.5)', textTransform: 'uppercase', letterSpacing: '.08em' }}>{h}</th>;})}</tr></thead>
                <tbody>{preview.tickets.slice(0, 20).map(function (t, i) {return (
                      <tr key={i} style={{ borderBottom: '1px solid var(--bsoft)' }}><td style={{ padding: '6px 8px', color: 'var(--text2)', fontSize: 13 }}>{i + 1}</td><td style={{ padding: '6px 8px', fontFamily: 'JetBrains Mono,monospace', fontWeight: 700, color: 'var(--info)' }}>#{t.num}</td><td style={{ padding: '6px 8px', fontWeight: 600 }}>{t.name}</td><td style={{ padding: '6px 8px' }}><span className="bu-tag">{t.bu}</span></td><td style={{ padding: '6px 8px' }}>{t.status === 'resolved' ? <span className="st-res">RES</span> : t.status === 'progress' ? <span className="st-prg">PRG</span> : <span className="st-unr">UNR</span>}</td></tr>);})}
                {preview.count > 20 && <tr><td colSpan={5} style={{ padding: '7px 8px', textAlign: 'center', color: 'var(--text2)', fontSize: 13 }}>...and {preview.count - 20} more</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        </div>}
      </div>
    </div>);

}

          localStorage.setItem('ek_photos_v2', JSON.stringify(next));

function CloudSync({ agent, tickets, setTickets, showToast, agentShift }) {
  // ── Power Automate URL keys (no GitHub / Gist anywhere) ──
  const PA_PULL_KEY = 'ek_pa_pull_url';
  const PA_PUSH_KEY = 'ek_pa_push_url';
  const [pullUrl, setPullUrl] = useState(() => localStorage.getItem(PA_PULL_KEY) || '');
  const [pushUrl, setPushUrl] = useState(() => localStorage.getItem(PA_PUSH_KEY) || '');
  const [pullDraft, setPullDraft] = useState('');
  const [pushDraft, setPushDraft] = useState('');
  const [saving, setSaving] = useState(false);
  const [status, setStatus] = useState({ msg: '', ok: true });
  const [lastSync, setLastSync] = useState(() => localStorage.getItem('ek_last_sync') || '');
  const [preview, setPreview] = useState(null);

  // auto-pull once per session if Pull URL is already configured
  useEffect(function () {
    const done = sessionStorage.getItem('ek_ag_pulled_' + agent.id);
    if (!done && pullUrl) {sessionStorage.setItem('ek_ag_pulled_' + agent.id, '1');setTimeout(pullNow, 1200);}
  }, []); // eslint-disable-line

  function savePullUrl() {
    const u = (pullDraft || '').trim();
    if (!u) {showToast('Paste your Power Automate Pull URL first', 'error');return;}
    localStorage.setItem(PA_PULL_KEY, u);setPullUrl(u);setPullDraft('');showToast('Pull URL saved ✓');
  }
  function savePushUrl() {
    const u = (pushDraft || '').trim();
    if (!u) {showToast('Paste your Power Automate Push URL first', 'error');return;}
    localStorage.setItem(PA_PUSH_KEY, u);setPushUrl(u);setPushDraft('');showToast('Push URL saved ✓');
  }
  function clearUrls() {
    if (!window.confirm('Clear both Power Automate URLs from this device?')) return;
    localStorage.removeItem(PA_PULL_KEY);localStorage.removeItem(PA_PUSH_KEY);
    setPullUrl('');setPushUrl('');showToast('URLs cleared');
  }

  async function pullNow() {
    if (!pullUrl) {showToast('Set your Pull URL first', 'error');return;}
    setSaving(true);setStatus({ msg: 'Pulling from SharePoint via Power Automate…', ok: true });
    try {
      const res = await fetch(pullUrl, { method: 'POST' });
      if (!res.ok) throw new Error('HTTP ' + res.status + ' — check your Pull URL');
      const cloud1 = await res.json();

      // Normalise {manager:[...]} format from Pull All Tickets flow
      var normalized1 = {};
      if (Array.isArray(cloud1.manager)) {
        // Pull All returns {manager:[tickets]} — assign each ticket correct agent from AssignedTo field
        var flatAll = cloud1.manager.map(function (t) {
          var spStatus = t.status || t.Status || '';
          return Object.assign({}, t, {
            id: t.id || 'tk_mgr_' + t.num,
            agent: t.agent || 'manager',
            issue: t.issue || t.description || t.Description || t.note || '',
            status: function (s) {s = s || '';return s === 'Closed' || s === 'Resolved' ? 'resolved' : s === 'Assigned' || s === 'In Progress' || s === 'progress' ? 'progress' : 'unresolved';}(spStatus)
          });
        });
        normalized1 = { manager: flatAll };
      } else if (Array.isArray(cloud1.days)) {
        var flatTickets = [];
        cloud1.days.forEach(function (day) {
          (day.tickets || []).forEach(function (t) {
            flatTickets.push({
              id: t.id || 'tk_' + t.num,
              num: t.num || '',
              created: t.created || t.received || t.receivedAt || t.createdAt || t.date || t.Date || t.dateCreated || t.receivedDate || t.Created || t.timestamp || '',
              time: t.time || '',
              name: t.name || '',
              phone: (t.phone || '').replace(/^\+234/, '0'),
              meter: t.meter || '',
              addr: t.address || t.addr || '',
              bu: t.bu || '',
              issue: t.note || t.title || '',
              resp: t.assignee || '',
              category: t.category && t.subcategory ? t.category + ' — ' + t.subcategory : t.category || '',
              status: function (s) {s = s || '';return s === 'Closed' ? 'resolved' : s === 'Resolved' ? 'resolved' : s === 'Assigned' ? 'progress' : s === 'In Progress' ? 'progress' : s === 'Pending' ? 'unresolved' : 'unresolved';}(t.status || t.Status || ''),
              note: t.resolutionNote || '',
              agent: 'manager',
              day: day.dayNum || new Date().getDate()
            });
          });
        });
        normalized1 = { manager: flatTickets };
      } else {
        normalized1 = cloud1;
      }

      var cloud = Object.assign({}, normalized1);

      // If response uses 'agent' key (pull_today flow), remap to signed-in agent's id
      if (Array.isArray(cloud.agent) && !cloud[agent.id]) {
        cloud[agent.id] = cloud.agent.map(function (t) {
          return Object.assign({}, t, {
            agent: agent.id,
            id: t.id || 'tk_' + agent.id + '_' + t.num,
            status: function (s) {return s === 'Pending' ? 'unresolved' : s === 'Resolved' ? 'resolved' : s === 'In Progress' ? 'progress' : (s || 'unresolved').toLowerCase();}(t.status || t.Status || '')
          });
        });
        delete cloud.agent;
      }

      // Persist shifts / schedule / guide to localStorage (App polls every 5 s)
      if (cloud._shifts && typeof cloud._shifts === 'object') {
        try {localStorage.setItem('ek_v2_shifts', JSON.stringify(cloud._shifts));} catch (e) {}
      }
      if (cloud._sched && typeof cloud._sched === 'object') {
        Object.keys(cloud._sched).forEach(function (agId) {
          const agSched = cloud._sched[agId];
          if (typeof agSched === 'object') {
            Object.keys(agSched).forEach(function (dateStr) {
              localStorage.setItem('ek_sched_' + agId + '_' + dateStr, agSched[dateStr]);
            });
          }
        });
      }
      if (Array.isArray(cloud._guide) && cloud._guide.length) {try {localStorage.setItem('ek_guide', JSON.stringify(cloud._guide));} catch (e) {}}

      // Merge all agent ticket arrays into one shared pool using dedupTickets
      var merged = tickets.slice();
      var added = 0;
      Object.keys(cloud).forEach(function (agId) {
        if (agId.charAt(0) === '_') return;
        if (!Array.isArray(cloud[agId])) return;
        // Ensure every pulled ticket has 'created' for month-grouping
        var normalised = cloud[agId].map(function (t) {
          if (t.created) return t;
          var d = t.received || t.receivedAt || t.createdAt || t.date || t.Date || t.dateCreated || t.receivedDate || t.Created || t.timestamp || '';
          return d ? Object.assign({}, t, { created: d }) : t;
        });
        // Log-only mode: never overwrite existing ticket status/note — only add brand new tickets
        var existingNums = new Set(merged.map(function (x) {return _norm(x.num || '');}));
        var existingIds = new Set(merged.map(function (x) {return x.id || '';}));
        normalised.forEach(function (t) {
          var n = _norm(t.num || '');
          if (n && existingNums.has(n) || t.id && existingIds.has(t.id)) return;
          merged.push(t);if (n) existingNums.add(n);if (t.id) existingIds.add(t.id);added++;
        });
      });
      function persistTickets(tix) {try {localStorage.setItem('ek_v2_tickets', JSON.stringify(tix));} catch (e) {console.warn('persistTickets failed', e);}}
      persistTickets(merged);setTickets(merged);

      const now = new Date().toLocaleString('en-GB', { timeZone: 'Africa/Lagos' });
      setLastSync(now);localStorage.setItem('ek_last_sync', now);setPreview(cloud);
      const msg = '✅ Pulled ' + added + ' new tickets from SharePoint.';
      setStatus({ msg, ok: true });showToast(msg);
    } catch (e) {setStatus({ msg: 'Pull failed: ' + e.message, ok: false });showToast('Pull failed', 'error');} finally
    {setSaving(false);}
  }

  async function pushNow() {
    if (!pushUrl) {showToast('Set your Push URL first', 'error');return;}
    setSaving(true);setStatus({ msg: 'Pushing to SharePoint via Power Automate…', ok: true });
    try {
      const watNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
      const todayStr = watNow.getFullYear() + '-' + String(watNow.getMonth() + 1).padStart(2, '0') + '-' + String(watNow.getDate()).padStart(2, '0');
      const todayTix = tickets.filter(function (t) {return !t._baseline && inDutyWindow(t, agentShift);});
      function toSpStatus(s) {return s === 'resolved' ? 'Closed' : s === 'progress' ? 'Assigned' : 'Pending';}
      const mappedTix = todayTix.map(function (t) {return Object.assign({}, t, { spStatus: toSpStatus(t.status) });});
      const payload = { agentId: agent.id, agentName: agent.name, date: todayStr, tickets: mappedTix, pushedAt: new Date().toISOString() };
      const res = await fetch(pushUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status + ' — check your Push URL');
      const now = new Date().toLocaleString('en-GB', { timeZone: 'Africa/Lagos' });
      setLastSync(now);localStorage.setItem('ek_last_sync', now);
      const msg = '✅ Pushed ' + todayTix.length + ' tickets to SharePoint.';
      setStatus({ msg, ok: true });showToast(msg);
    } catch (e) {setStatus({ msg: 'Push failed: ' + e.message, ok: false });showToast('Push failed', 'error');} finally
    {setSaving(false);}
  }

  return (
    <div>
      <div className="topbar"><div><div className="eyebrow">CLOUD SYNC</div><div className="page-title">☁ Cloud Sync — SharePoint via Power Automate</div></div></div>
      <div className="pad">

        {/* ── Pull URL setup (shown when not yet saved) ── */}
        {!pullUrl &&
        <div style={{ background: 'rgba(255,199,44,.06)', border: '1.5px solid rgba(255,199,44,.4)', borderRadius: 12, padding: 16, marginBottom: 14 }}>
            <div style={{ font: '800 14px Sora,sans-serif', color: 'var(--text)', marginBottom: 6 }}>🔗 Set Power Automate Pull URL</div>
            <div style={{ font: '600 12px/1.6 Sora,sans-serif', color: 'var(--muted)', marginBottom: 12 }}>In Power Automate, create an <b style={{ color: 'var(--text)' }}>HTTP request trigger</b> flow that reads your SharePoint ticket list and returns JSON. Paste the flow URL below — it stays on this device only.</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8 }}>
              <input className="inp" type="text" value={pullDraft} onChange={function (e) {setPullDraft(e.target.value);}} placeholder="https://prod-xx.westeurope.logic.azure.com/…" />
              <button onClick={savePullUrl} style={{ padding: '8px 14px', background: '#16A34A', color: '#fff', border: 'none', borderRadius: 8, font: '800 12px Sora,sans-serif', cursor: 'pointer' }}>✓ Save</button>
            </div>
          </div>
        }

        {/* ── Push URL setup (shown when not yet saved) ── */}
        {!pushUrl &&
        <div style={{ background: 'rgba(99,102,241,.06)', border: '1.5px solid rgba(99,102,241,.4)', borderRadius: 12, padding: 16, marginBottom: 14 }}>
            <div style={{ font: '800 14px Sora,sans-serif', color: 'var(--text)', marginBottom: 6 }}>🔗 Set Power Automate Push URL</div>
            <div style={{ font: '600 12px/1.6 Sora,sans-serif', color: 'var(--muted)', marginBottom: 12 }}>Create a second <b style={{ color: 'var(--text)' }}>HTTP request trigger</b> flow that accepts a POST body with agent ticket data and writes it to your SharePoint list. Paste the URL below.</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8 }}>
              <input className="inp" type="text" value={pushDraft} onChange={function (e) {setPushDraft(e.target.value);}} placeholder="https://prod-xx.westeurope.logic.azure.com/…" />
              <button onClick={savePushUrl} style={{ padding: '8px 14px', background: '#1D4ED8', color: '#fff', border: 'none', borderRadius: 8, font: '800 12px Sora,sans-serif', cursor: 'pointer' }}>✓ Save</button>
            </div>
          </div>
        }

        {status.msg && <div style={{ padding: '11px 14px', borderRadius: 10, background: status.ok ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)', border: '1px solid ' + (status.ok ? 'rgba(34,197,94,.3)' : 'rgba(239,68,68,.3)'), font: '600 12px Sora,sans-serif', color: status.ok ? 'var(--okb)' : 'var(--bdb)', marginBottom: 12 }}>{status.msg}</div>}
        {preview && <div style={{ padding: '10px 12px', borderRadius: 8, background: 'rgba(255,255,255,.04)', border: '1px solid var(--bsoft)', font: '600 11px/1.4 JetBrains Mono,monospace', color: 'var(--muted)', marginBottom: 12 }}>☁ SharePoint: {Object.entries(preview).filter(function ([k]) {return k.charAt(0) !== '_';}).map(function ([k, v]) {return k + ': ' + (Array.isArray(v) ? v.length : 0);}).join(' · ')}</div>}

        {/* ── Pull / Push buttons ── */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
          <button onClick={pullNow} disabled={saving || !pullUrl} style={{ padding: '20px', background: saving || !pullUrl ? 'rgba(255,255,255,.06)' : '#16A34A', color: '#fff', border: 'none', borderRadius: 11, font: '800 14px Sora,sans-serif', cursor: saving || !pullUrl ? 'not-allowed' : 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, opacity: saving || !pullUrl ? .55 : 1 }}>

                <input className="inp" type="text" value={pullDraft} onChange={function (e) {setPullDraft(e.target.value);}} placeholder={'Pull: ' + pullUrl.slice(0, 42) + '…'} style={{ fontSize: 10 }} />

function DataScreen({ agent, tickets, setTickets, showToast, agentShift }) {
  const watNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
  const todayStr = watNow.toISOString().slice(0, 10);
  const todayTix = tickets.filter(function (t) {return (t.agent === agent.id || t.agentId === agent.id) && inDutyWindow(t, agentShift);});
  const [dragging, setDragging] = useState(false);
  const [preview, setPreview] = useState(null);
  const [tab, setTab] = useState('export');
  const fileRef = useRef(null);
  function dlToday() {const data = { exportedBy: { name: agent.name, id: agent.id }, exportedAt: new Date().toISOString(), period: { date: todayStr }, tickets: todayTix };const a = document.createElement('a');a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(data, null, 2));a.download = 'ekedp_agent_' + agent.id + '_' + todayStr + '.json';a.click();showToast('Exported ' + todayTix.length + ' tickets ✓');}
  function dlAll() {const data = { exportedBy: { name: agent.name, id: agent.id }, exportedAt: new Date().toISOString(), tickets: tickets };const a = document.createElement('a');a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(data, null, 2));a.download = 'ekedp_agent_' + agent.id + '_all_' + todayStr + '.json';a.click();showToast('All exported ✓');}
  function exportCSV() {const headers = ['ID', 'Customer Name', 'Customer Address', 'Meter No./Account No.', 'Meter No', 'Account No', 'Metered', 'Action Taken', 'Telephone Number', 'Email Address', 'Business Unit', 'Complaint Description', 'Assigned to', 'Status', 'Complaint Category', 'Complaint Sub-category', 'Channel of Complaint', 'Customer House No', 'Customer Street Name', 'Customer State of Resident', 'Customer Local Govt Area', 'Disco Code', 'Forum Name', 'Complaint House No', 'Complaint Street Name', 'Complaint Local Govt Area', 'Complaint Area', 'Resolved Date', 'Closed By', 'Disco REF No', 'Customer Service Name', 'Conversation ID', 'Created', 'Created By'];const rows = [headers, ...tickets.slice().reverse().map(function (t, i) {return [t.num, t.name, t.addr || t.address || '', t.meter || '', t.meter || '', t.account || '', t.metered || '', t.note || '', t.phone, t.email || '', t.bu, t.issue || t.complaint || '', t.resp || t.responsible || '', t.status, t.category || '', '', t.channel || 'Mobile App', '', '', '', '', '', '', '', '', '', '', t.resolvedDate || '', '', '', ' ', t.name, t.conversationId || '', t.created || '', 'PowerPlatform'];})];const csv = rows.map(function (r) {return r.map(function (c) {return '"' + (c || '').toString().replace(/"/g, '""') + '"';}).join(',');}).join('\n');const a = document.createElement('a');a.href = 'data:text/csv,' + encodeURIComponent(csv);a.download = 'ekedp_agent_' + agent.id + '.csv';a.click();showToast('CSV exported ✓');}
  function processFile(file) {const reader = new FileReader();reader.onload = function (e) {try {const data = JSON.parse(e.target.result);let imported = [];if (Array.isArray(data)) {imported = data;} else if (Array.isArray(data.tickets)) {imported = data.tickets;} else if (Array.isArray(data.days)) {data.days.forEach(function (day) {(day.tickets || []).forEach(function (t) {imported.push(t);});});} else {Object.keys(data).forEach(function (k) {if (k.charAt(0) !== '_' && Array.isArray(data[k])) data[k].forEach(function (t) {imported.push(t);});});}if (!imported.length) throw new Error('No tickets found');setPreview({ count: imported.length, by: data.exportedBy, tickets: imported });} catch (err) {showToast('Invalid JSON: ' + err.message, 'error');}};reader.readAsText(file);}
  function confirmImport() {if (!preview) return;
    const r = dedupTickets(tickets, preview.tickets);
    const merged = [...r.merged, ...r.kept];
    // Write to shared global store (not per-agent) so all agents see the imported tickets
    try {localStorage.setItem('ek_v2_tickets', JSON.stringify(merged));} catch (e) {}
    setTickets(merged);
    showToast('Imported ' + r.kept.length + ' new' + (r.updated > 0 ? ' · ' + r.updated + ' updated' : '') + (r.dropped > 0 ? ' · ' + r.dropped + ' duplicate' + (r.dropped > 1 ? 's' : '') + ' skipped' : '') + ' ✓');

function getAutoTheme() {
  var h = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' })).getHours();
  if (h >= 6 && h < 12) return 'bright'; // morning
  if (h >= 12 && h < 17) return 'solar'; // afternoon
  if (h >= 17 && h < 22) return 'green'; // evening
  return 'night'; // late night
}

function AgentSettings({ agent, tickets, setTickets, showToast }) {
  function onDedup() {
    var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
    var seen = new Set();
    var deduped = all.filter(function (t) {
      var n = _norm(t.num || '');
      // Tickets WITH number: key = num; WITHOUT: key = name+phone+date (catches paste duplicates)
      var key = n ? n : _norm(t.name || '') + '|' + _norm(t.phone || '') + '|' + (t.created || t.loggedAt || '').slice(0, 10);
      if (!key || key === '||') return true;
      if (seen.has(key)) return false;
      seen.add(key);return true;
    });
    var removed = all.length - deduped.length;
    if (!removed) {showToast('No duplicates found ✓');return;}
    if (!window.confirm('Remove ' + removed + ' duplicate ticket' + (removed > 1 ? 's' : '') + ' from the shared store? This cannot be undone.')) return;
    localStorage.setItem('ek_v2_tickets', JSON.stringify(deduped));
    setTickets(deduped.filter(function (t) {return t.agent === agent.id || t.agentId === agent.id;}));
    showToast('🧹 Removed ' + removed + ' duplicate' + (removed > 1 ? 's' : '') + ' ✅');
  }
  function onPurge() {
    if (!window.confirm('Delete ALL tickets dated before May 1 2026 (test data)? This cannot be undone.')) return;
    var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
    var kept = all.filter(function (t) {var d = t.loggedAt || t.created || '';return d ? d >= '2026-05-01' : true;});
    var removed = all.length - kept.length;
    localStorage.setItem('ek_v2_tickets', JSON.stringify(kept));
    setTickets(kept.filter(function (t) {return t.agent === agent.id || t.agentId === agent.id;}));
    showToast('🗑 Purged ' + removed + ' pre-May test ticket' + (removed !== 1 ? 's' : '') + ' ✅');
  }
  return (
    <div>
      <div className="topbar">
        <div><div className="eyebrow">SETTINGS</div><div className="page-title">Data Management</div></div>

      </div>

            <button className="btn" onClick={onDedup} style={{ padding: '14px 18px', background: 'rgba(59,130,246,.12)', border: '1px solid rgba(59,130,246,.3)', color: '#93C5FD', borderRadius: 10, font: '700 13px Sora,sans-serif', cursor: 'pointer', textAlign: 'left', display: 'flex', flexDirection: 'column', gap: 4 }}>

              <span style={{ font: '500 11px Sora,sans-serif', color: 'var(--muted)' }}>Scans all agents' tickets and removes entries with the same ticket number</span>
            </button>
            <button className="btn" onClick={onPurge} style={{ padding: '14px 18px', background: 'rgba(239,68,68,.1)', border: '1px solid rgba(239,68,68,.3)', color: '#FCA5A5', borderRadius: 10, font: '700 13px Sora,sans-serif', cursor: 'pointer', textAlign: 'left', display: 'flex', flexDirection: 'column', gap: 4 }}>
              <span>🗑 Purge Pre-May 2026 Test Data</span>
