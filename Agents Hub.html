      responsible: t.resp || '',
      actionTaken: t.note || '',
      resolvedBy: t.status === 'resolved' ? t.resp || agent.name : '',
      resolvedDate: t.status === 'resolved' ? new Date().toISOString().slice(0, 10) : '',
      agentName: agent.name,
      updatedBy: agent.name
    };
    fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).
    then(function (r) {if (r.ok) showToast('✅ Synced to SharePoint', 'success');else showToast('⚠️ Sync failed (' + r.status + ')', 'warn');}).
    catch(function () {showToast('⚠️ Sync failed — check PA URL', 'warn');});
  }
  // ─────────────────────────────────────────────────────────

  function onSave(t) {setTickets(tickets.map(function (x) {return x.id === t.id ? t : x;}));setEditing(null);pushToSharePoint(t);showToast('Ticket updated.');}
  function onDelete(t) {setTickets(tickets.filter(function (x) {return x.id !== t.id;}));setEditing(null);showToast('Deleted.');}
  function onCreate(t) {
    const arr = Array.isArray(t) ? t : [t];
    const r = dedupTickets(tickets, arr);
    const u = [...r.merged, ...r.kept];
    setTickets(u);
    if (r.dropped > 0) showToast('Added ' + r.kept.length + ' · ' + r.dropped + ' duplicate' + (r.dropped > 1 ? 's' : '') + ' skipped', 'warn');else
    showToast('Ticket' + (r.kept.length > 1 ? 's' : ' #' + (r.kept[0] || {}).num) + ' saved!');
    setScreen('tickets');
  }
  function onUpdateAllTix(updated) {
    // Update in global shared store
    try {
      var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
      var found = all.some(function (t) {return t.id === updated.id;});
      var next = found ? all.map(function (t) {return t.id === updated.id ? updated : t;}) : all.concat([updated]);
      localStorage.setItem('ek_v2_tickets', JSON.stringify(next));
    } catch (e) {}
    // Update agent-local state if it's their ticket
    if (tickets.some(function (t) {return t.id === updated.id;})) {
      setTickets(tickets.map(function (t) {return t.id === updated.id ? updated : t;}));
    }
    setSyncTick(function (n) {return n + 1;});
    pushToSharePoint(updated);
    showToast('Ticket #' + updated.num + ' updated.');
  }
  function onDeleteAllTix(id) {
    // Delete from global store
    try {
      var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
      localStorage.setItem('ek_v2_tickets', JSON.stringify(all.filter(function (t) {return t.id !== id;})));
    } catch (e) {}
    setTickets(tickets.filter(function (t) {return t.id !== id;}));
    setSyncTick(function (n) {return n + 1;});
    showToast('Ticket deleted.');
  }
  function onDeleteBulkAllTix(ids) {
    var idSet = new Set(ids);
    try {
      var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
      localStorage.setItem('ek_v2_tickets', JSON.stringify(all.filter(function (t) {return !idSet.has(t.id);})));
    } catch (e) {}
    setTickets(tickets.filter(function (t) {return !idSet.has(t.id);}));
    setSyncTick(function (n) {return n + 1;});
  }

  if (!agent) return <Signin onSignIn={onSignIn} />;

  const agentShift = shifts[agent.id] || 'day';
  const screens = {
    dashboard: <Dashboard agent={agent} allTix={viewTix} shifts={shifts} activeMonth={activeMonth} />,
    all: <AllComplaints agent={agent} allTix={viewTix} onUpdate={onUpdateAllTix} onDelete={onDeleteAllTix} onDeleteBulk={onDeleteBulkAllTix} showToast={showToast} />,
    tickets: <TicketsScreen agent={agent} tickets={tickets} allTix={viewTix} onEdit={onEdit} onUpdate={onUpdateAllTix} onDelete={onDeleteAllTix} showToast={showToast} agentShift={agentShift} onCreate={onCreate} />,
    slot: <SlotReport agent={agent} tickets={tickets} showToast={showToast} agentShift={agentShift} />,
    guide: <SupportGuide agent={agent} showToast={showToast} />,
    photos: <ProfilePhotos showToast={showToast} />,
    data: <DataScreen agent={agent} tickets={allTix} setTickets={setTickets} showToast={showToast} agentShift={agentShift} />,
    sync: <CloudSync agent={agent} tickets={tickets} setTickets={setTickets} showToast={showToast} agentShift={agentShift} />,
    settings: <AgentSettings agent={agent} tickets={tickets} setTickets={setTickets} showToast={showToast} />
  };

  return (
    <div style={{ '--agent': agent.color, '--agent-tint': agent.tint }}>
      {/* NAV */}
      <nav className={'nav' + (navCollapsed ? ' nc' : '')}>

          <div className="nav-user">
            <Av agent={agent} size={30} />
            <div><div className="nav-user-info">Signed in as</div><div className="nav-user-name">{agent.name.split(' ')[0]}</div></div>
          </div>
        </div>
        <div className="nav-mon" style={{ padding: '8px 12px', borderBottom: '1px solid rgba(42,64,153,.4)' }}>
          <div style={{ font: '700 8px/1 Sora,sans-serif', color: 'rgba(255,255,255,.25)', textTransform: 'uppercase', letterSpacing: '.14em', marginBottom: 6 }}>MONTH</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3, maxHeight: 140, overflowY: 'auto' }}>
            {availMonths.map(function (ym) {
              var on = activeMonth === ym;
              var isCur = ym === currentYM;
              var parts = ym.split('-');
              var label = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, 1).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
              var pending = allTix.filter(function (t) {return shiftWatYM(t) === ym && t.status !== 'resolved';}).length;
              var acBorder = isCur ? '#22C55E' : 'rgba(227,6,19,.6)';
              var acBg = isCur ? 'rgba(34,197,94,.1)' : 'rgba(227,6,19,.1)';
              return (
                <button key={ym} onClick={function () {setActiveMonth(ym);localStorage.setItem('ek_active_month', ym);}}
                style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 9px', borderRadius: 7, border: '1px solid ' + (on ? acBorder : 'rgba(42,64,153,.5)'), background: on ? acBg : 'transparent', color: on ? '#fff' : 'rgba(255,255,255,.35)', font: '600 11px/1 Sora,sans-serif', cursor: 'pointer', transition: 'all .15s' }}>
                  <span>{label}</span>
                  <span style={{ fontSize: 8, padding: '2px 6px', borderRadius: 8, background: on ? isCur ? 'rgba(34,197,94,.2)' : 'rgba(227,6,19,.2)' : 'rgba(255,255,255,.06)', color: isCur ? '#4ADE80' : pending > 0 ? '#FCD34D' : 'rgba(255,255,255,.3)', fontWeight: 700, letterSpacing: '.06em', whiteSpace: 'nowrap' }}>
                    {isCur ? 'LIVE' : pending > 0 ? pending + 'p' : '✓'}
                  </span>
                </button>);

            })}
          </div>
        </div>
        <div className="nav-body">
          {NAV.map(function (n) {return (
              <button key={n.id} className={'nav-item' + (screen === n.id ? ' on' : '')} onClick={function () {setScreen(n.id);}}>
              <span style={{ fontSize: 13, flexShrink: 0 }}>{n.icon}</span>
              <span>{n.label}</span>
            </button>);})}
        </div>
        <div className="nav-foot">
          <div className="theme-row">
            {THEMES.map(function (t) {return (
                <div key={t.id} className={'tdot' + (theme === t.id ? ' on' : '')} title={t.label}
                onClick={function () {const actual = t.id === 'auto' ? getAutoTheme() : t.id;setTheme(actual);localStorage.setItem('ek_theme_mode', t.id);}}
                style={{ background: t.sw, border: theme === t.id || localStorage.getItem('ek_theme_mode') === t.id ? '1.5px solid var(--ek-gold)' : '1.5px solid rgba(255,255,255,.15)' }} />);})}
          </div>
          <button className="signout" onClick={onSignOut}><span style={{ fontSize: 12 }}>↩</span>Sign out</button>
        </div>
      </nav>
      {/* MAIN */}
      <main className={'main' + (navCollapsed ? ' nc' : '')}>{screens[screen] || screens.dashboard}</main>
      {editing && <EditModal ticket={editing} agent={agent} onSave={onSave} onDelete={onDelete} onClose={function () {setEditing(null);}} />}
      {toast && <div className="toast" style={{ borderColor: toast.type === 'error' ? '#DC2626' : '#E30613' }}><span style={{ color: toast.type === 'error' ? '#F87171' : '#FFC72C' }}>⚡</span>{toast.msg}</div>}
    </div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
