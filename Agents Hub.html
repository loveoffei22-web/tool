body[data-theme="green"] .main{background:transparent!important;}
body[data-theme="green"] .nav{background:linear-gradient(180deg,rgba(9,52,28,.92) 0%,rgba(5,34,18,.96) 100%)!important;border-right:1px solid rgba(150,230,150,.22)!important;backdrop-filter:blur(14px)!important;}
body[data-theme="green"] .hero{background:linear-gradient(135deg,rgba(8,56,28,.52) 0%,rgba(16,80,40,.32) 100%)!important;border-bottom:3px solid rgba(123,240,138,.55)!important;}
body[data-theme="green"] .topbar{background:rgba(8,46,24,.7)!important;border-color:rgba(150,230,150,.2)!important;backdrop-filter:blur(10px)!important;}
body[data-theme="green"] .card,body[data-theme="green"] .kpi-card,body[data-theme="green"] .agent-card,body[data-theme="green"] .roster-card{background:rgba(9,42,22,.95)!important;border-color:rgba(150,230,150,.2)!important;}
body[data-theme="green"] .card-head{background:rgba(12,52,28,.92)!important;border-color:rgba(150,230,150,.2)!important;}
body[data-theme="green"] .tbl thead tr,body[data-theme="green"] .ctbl thead tr{background:rgba(7,42,22,.92)!important;}
body[data-theme="green"] .tbl tbody tr:hover td{background:rgba(123,240,138,.08)!important;}
body[data-theme="green"] .signin-card{background:rgba(10,48,24,.82)!important;border-color:rgba(150,230,150,.22)!important;backdrop-filter:blur(14px)!important;}
body[data-theme="green"] .inp,body[data-theme="green"] .sel,body[data-theme="green"] .slot-box,body[data-theme="green"] .wa-box{background:rgba(8,42,22,.6)!important;border-color:rgba(150,230,150,.24)!important;}
body[data-theme="green"] .live-dot{background:#4ADE80!important;}
body[data-theme="night"] .toast{background:linear-gradient(180deg,rgba(12,22,60,.96) 0%,rgba(6,12,38,.97) 100%) !important;color:#EAF1FF !important;border-color:#E30613 !important;}
body[data-theme="green"] .toast{background:linear-gradient(180deg,rgba(12,56,30,.96) 0%,rgba(6,36,18,.97) 100%) !important;color:#EAFBEA !important;border-color:#E30613 !important;}
body[data-theme="bright"] .toast.err{background:#7F1D1D !important;border-color:#DC2626 !important;color:#fff !important;}
/* Dash-matching strip: mirrors the side nav gradient per theme */
.dashbar{background:linear-gradient(180deg,#070f2e 0%,#030919 100%);color:rgba(255,255,255,.75);}
body[data-theme="bright"] .dashbar{background:linear-gradient(180deg,#13205A,#0D1B45)!important;color:rgba(255,255,255,.75)!important;}
body[data-theme="solar"] .dashbar{background:linear-gradient(180deg,#7A4E12 0%,#52391B 100%)!important;color:rgba(255,255,255,.96)!important;}
body[data-theme="night"] .dashbar{background:linear-gradient(180deg,rgba(8,14,40,.92) 0%,rgba(4,8,24,.96) 100%)!important;color:rgba(234,241,255,.85)!important;}
body[data-theme="green"] .dashbar{background:linear-gradient(180deg,rgba(9,52,28,.92) 0%,rgba(5,34,18,.96) 100%)!important;color:rgba(234,251,234,.85)!important;}

/* ── RESTORED base layout + component CSS (was lost in an earlier edit) ── */
/* ── NAV ─────────────────────────────────────────────────── */
.nav{position:fixed;top:0;left:0;bottom:0;width:165px;z-index:200;
background:linear-gradient(180deg,#070f2e 0%,#030919 100%);
border-right:1px solid rgba(42,64,153,.5);display:flex;flex-direction:column;overflow:hidden;}
.nav-top{padding:12px 14px 10px;border-bottom:1px solid rgba(42,64,153,.4);flex-shrink:0;}
.nav-brand{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.nav-icon{width:30px;height:30px;border-radius:7px;overflow:hidden;flex-shrink:0;}
.nav-brand-txt{font:800 10px/1.2 Sora,sans-serif;color:#fff;}
.nav-brand-sub{font:600 8px/1 Sora,sans-serif;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}
.nav-user{display:flex;align-items:center;gap:8px;}
.nav-user-info{font:700 9px/1 Sora,sans-serif;color:rgba(255,255,255,.45);}
.nav-user-name{font:700 12px/1.1 Sora,sans-serif;color:#fff;margin-top:2px;}
.nav-body{flex:1;overflow-y:auto;padding:8px 10px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;border-left:2.5px solid transparent;font:600 11.5px/1 Sora,sans-serif;color:rgba(255,255,255,.45);cursor:pointer;transition:all .15s;margin-bottom:2px;background:transparent;width:100%;text-align:left;border-top:none;border-right:none;border-bottom:none;}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8);}
.nav-item.on{background:rgba(255,255,255,.07);border-left-color:var(--agent);color:#fff;font-weight:700;}
.nav-foot{padding:10px 14px;border-top:1px solid rgba(42,64,153,.4);flex-shrink:0;}
.theme-row{display:flex;gap:5px;margin-bottom:8px;}
.tdot{width:20px;height:20px;border-radius:5px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.tdot.on{border-color:var(--ek-gold);box-shadow:0 0 6px rgba(255,199,44,.6);}
.signout{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;border:1px solid rgba(220,38,38,.3);background:rgba(220,38,38,.1);color:#F87171;font:700 11px Sora,sans-serif;cursor:pointer;width:100%;}
/* ── MAIN ────────────────────────────────────────────────── */
.main{padding-left:165px;min-height:100vh;background:var(--bg);transition:padding-left .22s ease;}
/* Collapsible nav */
.nav{transition:width .22s ease;}
.nav.nc{width:54px!important;}
.nav.nc .nav-top{padding:12px 8px 10px;}
.nav.nc .nav-brand{justify-content:center;margin-bottom:0;gap:0;}
.nav.nc .nav-brand-txt,.nav.nc .nav-brand-sub,.nav.nc .nav-user,.nav.nc .nav-mon,.nav.nc .nav-item span:last-child,.nav.nc .signout span:last-child,.nav.nc .theme-row{display:none;}
.nav.nc .nav-body{padding:8px 6px;}
.nav.nc .nav-item{justify-content:center;padding:9px 0;border-left-width:0;}
.nav.nc .nav-foot{padding:10px 6px;}
.nav.nc .signout{justify-content:center;padding:9px 0;gap:0;}
.main.nc{padding-left:54px!important;}
.topbar{padding:14px 28px;border-bottom:1px solid var(--bsoft);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.eyebrow{font:700 10px/1 Sora,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--agent);}
.page-title{font:italic 800 22px/1.1 Sora,sans-serif;color:var(--text);margin-top:4px;}
.pad{padding:18px 28px;}
/* ── AGENT ROSTER CARD ─────────────────────────────────────── */
.roster-card{border-radius:14px;border:2.5px solid;padding:16px;position:relative;overflow:hidden;transition:transform .15s;}
.roster-card:hover{transform:translateY(-2px);}
.roster-card .you-badge{position:absolute;top:10px;right:10px;font:800 8px/1 Sora,sans-serif;padding:3px 7px;border-radius:4px;background:rgba(255,255,255,.15);color:#fff;letter-spacing:.08em;}
.shift-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:7px;font:700 11px/1 Sora,sans-serif;margin:8px 0;}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:10px;}
.stat-box{background:rgba(0,0,0,.25);border-radius:6px;padding:6px 4px;text-align:center;}
.stat-val{font:800 16px/1 'JetBrains Mono',monospace;}
.stat-lbl{font:700 8px/1 Sora,sans-serif;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;}
/* ── WEEK CALENDAR ─────────────────────────────────────────── */
.week-grid{width:100%;border-collapse:collapse;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;}
.wg-head{background:rgba(0,0,0,.3);padding:8px 6px;text-align:center;font:700 9px/1 Sora,sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bsoft);border-right:1px solid var(--bsoft);}
.wg-head.today{background:rgba(99,102,241,.18);color:var(--text);}
.wg-agent{display:flex;align-items:center;gap:7px;padding:9px 10px;border-bottom:1px solid var(--bsoft);border-right:1px solid var(--bsoft);background:rgba(0,0,0,.2);}
.wg-cell{padding:7px 4px;text-align:center;border-bottom:1px solid var(--bsoft);border-right:1px solid var(--bsoft);font:600 10px/1.3 Sora,sans-serif;}
.wg-cell.today-col{background:rgba(99,102,241,.06);}
/* ── COMPLAINTS TABLE ──────────────────────────────────────── */
.stat-bar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--bsoft);margin-bottom:14px;}
.sbar-item{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-right:1px solid var(--bsoft);}
.sbar-item:last-child{border-right:none;}
.sbar-lbl{font:600 12px/1 Sora,sans-serif;color:var(--text2);}
.sbar-val{font:800 20px/1 'JetBrains Mono',monospace;}
.ctbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
.ctbl thead tr{background:#13205A;}
.ctbl th{padding:9px 10px;text-align:left;font:700 11px/1 Sora,sans-serif;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.9);white-space:nowrap;}
.ctbl td{padding:8px 10px;border-bottom:1px solid var(--bsoft);color:var(--text2);vertical-align:top;}
.ctbl tbody tr{cursor:pointer;}
.ctbl tbody tr:hover td{background:rgba(255,255,255,.03);}
/* Excel-like inline editing */
.xls-cell{cursor:cell;transition:background .1s;}
.xls-cell:hover{background:rgba(255,198,44,.06)!important;}
.xls-cell.xls-active{outline:2px solid #FFC72C;outline-offset:-2px;position:relative;z-index:2;}
.xls-cell.xls-editing{outline:2px solid #60A5FA;outline-offset:-2px;position:relative;z-index:3;padding:0!important;overflow:visible!important;}
.xls-inp,.xls-sel{display:block;width:100%;min-height:28px;border:none;background:rgba(30,58,138,.9);color:#fff;font:700 11px/1.4 'Sora',sans-serif;padding:3px 6px;outline:none;cursor:auto;border-radius:0;}
.xls-inp{resize:none;height:100%;}
.xls-sel{cursor:pointer;}
.xls-hint{font:500 9px 'Sora',sans-serif;color:rgba(255,255,255,.3);display:block;margin-top:1px;}
/* Make table header sticky */
.ctbl thead tr,.tbl thead tr{position:sticky;top:0;z-index:10;background:#13205A;}
/* Constrain the scroll container */
.xls-scroll{max-height:65vh;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;}
.xls-scroll .ctbl{min-width:1180px;}
.xls-scroll::-webkit-scrollbar{height:8px;width:6px;}
.xls-scroll::-webkit-scrollbar-thumb{background:var(--sub);border-radius:4px;}
.ctbl tbody tr.expanded td{background:rgba(99,102,241,.06);}
.ctbl .exp-row td{background:rgba(0,0,0,.2);padding:12px 14px;}
/* Table readability on wallpaper themes — opaque surface so the photo doesn't bleed through rows */
body[data-theme="night"] .xls-scroll{background:#EAF2FA!important;}
body[data-theme="green"] .xls-scroll{background:#0B2E18!important;}
body[data-theme="solar"] .xls-scroll{background:#26180A!important;}
body[data-theme="bright"] .xls-scroll{background:#FFFFFF!important;}
body[data-theme] .ctbl td.ek-cust{color:var(--info)!important;font-weight:700!important;}
.st-res{color:#22C55E;font:800 11px/1 Sora,sans-serif;}
.st-prg{color:#F59E0B;font:800 11px/1 Sora,sans-serif;}
.st-unr{color:#EF4444;font:800 11px/1 Sora,sans-serif;}
.bu-tag{display:inline-flex;padding:2px 7px;border-radius:4px;font:700 9px/1 'JetBrains Mono',monospace;background:rgba(96,165,250,.15);color:#93C5FD;border:1px solid rgba(96,165,250,.2);}
.cat-main{font:700 11px/1 Sora,sans-serif;color:var(--text);}
.cat-sub{font:500 10px/1.3 Sora,sans-serif;color:var(--muted);margin-top:2px;}
/* ── MISC ──────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:12px;font:700 9px/1 Sora,sans-serif;text-transform:uppercase;letter-spacing:.04em;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
.badge-res{background:var(--okt);color:var(--okb);border:1px solid rgba(74,222,128,.25);}
.badge-prg{background:var(--wnt);color:var(--wnb);border:1px solid rgba(252,211,77,.25);}
.badge-unr{background:var(--bdt);color:var(--bdb);border:1px solid rgba(248,113,113,.28);}
.inp{width:100%;padding:9px 12px;background:rgba(0,0,0,.28);border:1px solid var(--bsoft);border-radius:8px;font:500 12px Sora,sans-serif;color:var(--text);outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--agent);}
.inp::placeholder{color:var(--sub);}
.sel{width:100%;padding:8px 10px;background:rgba(0,0,0,.28);border:1px solid var(--bsoft);border-radius:8px;font:500 11px Sora,sans-serif;color:var(--text);outline:none;}
.lbl{font:700 9px/1 Sora,sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:block;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 13px;border-radius:8px;font:700 11px/1 Sora,sans-serif;cursor:pointer;transition:all .15s;border:1px solid var(--bsoft);background:rgba(255,255,255,.05);color:var(--text);white-space:nowrap;}
.btn:hover{background:rgba(255,255,255,.1);}
.btn-agent{background:var(--agent);color:#0A1A4F;border-color:var(--agent);font-weight:800;box-shadow:0 4px 14px rgba(0,0,0,.25);}
.btn-sm{padding:5px 9px;font-size:10px;}
.card{background:linear-gradient(180deg,var(--card2,#1A2E7A),var(--card,#15276A));border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card-head{padding:11px 16px;border-bottom:1px solid var(--bsoft);display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(0,0,0,.2);}
.card-head h3{font:700 12px/1.2 Sora,sans-serif;color:var(--text);display:flex;align-items:center;gap:7px;}
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:linear-gradient(180deg,#070f2e 0%,#030919 100%);border:2px solid #E30613;border-radius:11px;padding:11px 16px;font:700 11.5px Sora,sans-serif;color:#fff;display:flex;align-items:center;gap:9px;box-shadow:0 12px 32px rgba(0,0,0,.5);animation:slideIn .2s ease;}
/* Dash-matching strip: mirrors the side nav gradient per theme */
.dashbar{background:linear-gradient(180deg,#070f2e 0%,#030919 100%);color:rgba(255,255,255,.75);}

@keyframes slideIn{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.signin-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:transparent;}
.signin-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;width:420px;max-width:94vw;}
.agent-pick{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:11px;cursor:pointer;transition:all .15s;}
.agent-pick:hover{border-color:var(--agent);}
.agent-pick.on{border-color:var(--agent);background:var(--agent-tint);}
.wa-box{background:rgba(0,0,0,.25);border:1px solid var(--bsoft);border-radius:9px;padding:13px;font:500 11px/1.6 'JetBrains Mono',monospace;color:var(--text2);white-space:pre-wrap;word-break:break-word;margin:10px 0;}
.mono{font-family:'JetBrains Mono',monospace;}

</style>

function loadTix(id) {

        var byAgentNums = new Set(byAgent.map(function (t) {return String(t.num || '').trim();}));
        var byAgentIds = new Set(byAgent.map(function (t) {return t.id || t.num;}));
        legacy.forEach(function (t) {
          var n = String(t.num || '').trim();
          if (n && byAgentNums.has(n)) return; // same ticket # already in global
          if (byAgentIds.has(t.id || t.num)) return;
          byAgent.push(Object.assign({}, t, { agent: id }));
          if (n) byAgentNums.add(n);

    // Migrate: backfill loggedAt from ticket ID timestamp for older tickets

      // Only update if incoming is MORE advanced than existing — never downgrade
      const rank = { resolved: 3, progress: 2, unresolved: 1 };

// Returns {start, end} as Date objects in WAT
// Mon–Fri: prev day 17:01 → today 17:00
// Saturday: prev Fri 17:01 → today 16:00
// Sunday: prev Sat 16:01 → today 16:00
// Shift-aware duty window rules:
// Saturday   : Fri 17:01 → Sat 16:00
function shiftWatDate(t) {
  var raw = t.created || t.received || t.receivedAt || t.createdAt || t.date || t.Date || t.dateCreated || t.receivedDate || t.Created || t.timestamp || t.Timestamp || '';
  if (!raw || typeof raw === 'number') return null;
  raw = String(raw).trim();if (!raw) return null;
  try {
    var d = new Date(raw);
    if (isNaN(d.getTime())) {
      var dm = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (dm) d = new Date(dm[3] + '-' + dm[1].padStart(2, '0') + '-' + dm[2].padStart(2, '0'));
      if (isNaN(d.getTime())) return null;
    }
    var wat = new Date(d.toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
    return wat.getFullYear() + '-' + String(wat.getMonth() + 1).padStart(2, '0') + '-' + String(wat.getDate()).padStart(2, '0');
  } catch (e) {return null;}
}
function shiftWatYM(t) {var d = shiftWatDate(t);return d ? d.slice(0, 7) : null;}
// Shift schedule (WAT):
// Saturday   : Fri 17:01 → Sat 16:00
// Sunday     : Sat 16:01 → Sun 16:00
// Monday     : Sun 16:01 → Mon 17:00
// Tue–Fri    : prev day 17:01 → today 17:00  (5:01 PM counts as next day)
function getDutyWindow(agentShift) {
  var now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
  var dow = now.getDay(); // 0=Sun,1=Mon…6=Sat
  var todayBase = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var start, end;
  if (dow === 6) {// Saturday: Fri 17:01 → Sat 16:00
    var fri = new Date(todayBase);fri.setDate(fri.getDate() - 1);
    start = new Date(fri.getFullYear(), fri.getMonth(), fri.getDate(), 17, 1, 0);
    end = new Date(todayBase.getFullYear(), todayBase.getMonth(), todayBase.getDate(), 16, 0, 0);
  } else if (dow === 0) {// Sunday: Sat 16:01 → Sun 16:00
    var sat = new Date(todayBase);sat.setDate(sat.getDate() - 1);
    start = new Date(sat.getFullYear(), sat.getMonth(), sat.getDate(), 16, 1, 0);
    end = new Date(todayBase.getFullYear(), todayBase.getMonth(), todayBase.getDate(), 16, 0, 0);
  } else if (dow === 1) {// Monday: Sun 16:01 → Mon 17:00
    var sun = new Date(todayBase);sun.setDate(sun.getDate() - 1);
    start = new Date(sun.getFullYear(), sun.getMonth(), sun.getDate(), 16, 1, 0);
    end = new Date(todayBase.getFullYear(), todayBase.getMonth(), todayBase.getDate(), 17, 0, 0);
  } else {// Tue–Fri: prev day 17:01 → today 17:00
    var prev = new Date(todayBase);prev.setDate(prev.getDate() - 1);
    start = new Date(prev.getFullYear(), prev.getMonth(), prev.getDate(), 17, 1, 0);
    end = new Date(todayBase.getFullYear(), todayBase.getMonth(), todayBase.getDate(), 17, 0, 0);
  }
  return { start: start, end: end };
}
function inDutyWindow(t, agentShift) {
  var w = getDutyWindow(agentShift);
  // Use loggedAt (when agent captured it) if present; fall back to created/receivedAt
  var d = new Date(t.loggedAt || t.created || t.receivedAt || '');
  if (isNaN(d.getTime())) return false;
  var watD = new Date(d.toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
  return watD >= w.start && watD <= w.end;
}
function fmtDutyWindow(agentShift) {
  var w = getDutyWindow(agentShift);
  var opts = { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'Africa/Lagos' };
  return w.start.toLocaleString('en-GB', opts) + ' → ' + w.end.toLocaleString('en-GB', opts);
}

  function stamp(t) {
    // FIX-BUG3: stamp() never overwrites a created date already parsed from complaint text
    // loggedAt = when the agent logged it (always now), used for duty window filtering
    const nowIso = new Date().toISOString();
    const base = { time: watNow.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }), created: nowIso, loggedAt: nowIso, id: 'tk_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6), day: watNow.getDate(), agent: agent.id };
    if (t && t.created) base.created = t.created; // preserve complaint date from parseSingle
    return base;
  }

    setPasted(txt);if (!txt.trim()) {setBulk([]);setSel([]);return;}
    const parsed = parseMultiple(txt);

    setBulk(cards);setSel(cards.map(function (_, i) {return i;}));
    if (cards.length === 1) setForm(Object.assign({}, EMPTY, cards[0]));
  }

  function toggleSel(i) {setSel(function (s) {return s.includes(i) ? s.filter(function (x) {return x !== i;}) : [...s, i];});}

  function clearAll() {setPasted('');setBulk([]);setSel([]);setForm(EMPTY);}
  function confirmBulk() {const chosen = bulk.filter(function (_, i) {return sel.includes(i);});if (!chosen.length) return;onCreate(chosen.map(function (t) {return Object.assign({}, t, stamp(t));}));clearAll();}
  function setF(k, v) {setForm(function (f) {return Object.assign({}, f, { [k]: v });});}
  function submitForm(e) {e.preventDefault();if (!form.num && !form.name) return;const s = stamp({});if (form.complaintDate) {s.created = form.complaintDate + 'T00:00:00.000Z';s.day = parseInt(form.complaintDate.slice(8, 10), 10);}onCreate(Object.assign({}, form, s));clearAll();}

        placeholder={"Paste one or more complaint blocks here…\n\n📱 NEW MOBILE APP COMPLAINT| 📅 24 May 2026 · 1:44 PM| 🎫 Ticket No: 720390| 👤 Customer: Clifford Benjamin| 📞 Phone: +2347079674724| 📍 Address: 12, isiba street| 🏢 Business Unit: MUSHIN| 📝 Description: Meter in tamper mode"}

              <button type="submit" style={{ flex: 1, padding: '10px', background: agent.color, color: '#0A1A4F', border: 'none', borderRadius: 8, font: '800 13px Sora,sans-serif', cursor: 'pointer' }}>➕ Add to my tickets</button>

            </div>
          </form>}

}

// ── SLOT REPORT ──────────────────────────────────────────────
function SlotReport({ agent, tickets, showToast, agentShift }) {
  const watNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
  const isWeekend = watNow.getDay() === 0 || watNow.getDay() === 6;
  const nowMin = watNow.getHours() * 60 + watNow.getMinutes();
  const todayStr = watNow.toISOString().slice(0, 10);

  // Custom day pick: '' = use today/duty window, 'YYYY-MM-DD' = filter that calendar day
  const [pickedDate, setPickedDate] = useState('');
  const useCustom = pickedDate !== '';

  // Resolved date string for display
  const reportDate = useCustom ? new Date(pickedDate + 'T12:00:00') : watNow;
  const dateStr = reportDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // 4 fixed slots — weekend and weekday are always shown; NOW badge marks the active one
  const SLOTS = [
  { id: 'w1pm', label: 'Weekend 1PM', sub: 'Weekends only', emoji: '🌤️', t: 13 * 60, weekend: true },
  { id: 'wd2pm', label: 'Weekday 2PM', sub: 'Weekdays only', emoji: '🌤️', t: 14 * 60, weekend: false },
  { id: 'w4pm', label: 'Weekend COB 4PM', sub: 'Weekends only', emoji: '🌆', t: 16 * 60, weekend: true },
  { id: 'wd5pm', label: 'Weekday COB 5PM', sub: 'Weekdays only', emoji: '🌆', t: 17 * 60, weekend: false }];


  // NOW = relevant slot whose window (±90 min) contains current time, else next upcoming relevant slot
  const rel = SLOTS.filter(function (s) {return s.weekend === isWeekend;});
  const nowSlot = function () {
    const near = rel.find(function (s) {return Math.abs(s.t - nowMin) <= 90;});
    if (near) return near.id;
    const next = rel.find(function (s) {return s.t > nowMin;});
    return next ? next.id : (rel[rel.length - 1] || SLOTS[0]).id;
  }();

  const [slot, setSlot] = useState(nowSlot);
  const s = SLOTS.find(function (x) {return x.id === slot;}) || SLOTS[0];

  // Filter tickets: custom day = any ticket whose created date matches pickedDate; today = duty window
  const todayTix = useCustom ?
  tickets.filter(function (t) {return (t.created || t.receivedAt || '').slice(0, 10) === pickedDate;}) :
  tickets.filter(function (t) {return inDutyWindow(t, agentShift);});
  const resTix = todayTix.filter(function (t) {return t.status === 'resolved';});
  const prgTix = todayTix.filter(function (t) {return t.status === 'progress';});
  const unrTix = todayTix.filter(function (t) {return t.status === 'unresolved';});
  const rate = todayTix.length ? Math.round(resTix.length / todayTix.length * 100) : 0;

  const msg = [
  s.emoji + ' *' + s.label + ' — EKEDP CX*',
  '📅 ' + dateStr,
  '👤 ' + agent.name + ' | CX Agent',
  '',
  '📊 *Today\'s Ticket Summary:*',
  '• Total Received Today: *' + todayTix.length + '*',
  '• Resolved: *' + resTix.length + '*',
  '• In Progress: *' + prgTix.length + '*',
  '• Unresolved: *' + unrTix.length + '*',
  '• Resolution Rate: *' + rate + '%*',
  '',
  unrTix.length > 0 ? '🔴 *' + unrTix.length + ' ticket' + (unrTix.length > 1 ? 's' : '') + ' still need action.*' : '✅ *All today\'s tickets resolved!*',
  '',
  '📱 EKEDP Power App — Reporting Tool'].
  join('\n');

  function copyMsg() {
    navigator.clipboard.writeText(msg).
    then(function () {(showToast || alert)('Copied! Paste into WhatsApp.');}).
    catch(function () {(showToast || alert)('Copy failed — try selecting text manually.', 'error');});
  }

  function doPDF() {
    function tRow(t, i) {
      return '<tr style="background:' + (i % 2 === 0 ? '#fff' : '#f8fafc') + '">' +

// ── IMPORT JSON ──────────────────────────────────────────────
function ImportJSON({ agent, tickets, setTickets, showToast }) {
  const [dragging, setDragging] = useState(false);
  const [preview, setPreview] = useState(null);
  const fileRef = useRef(null);
  function processFile(file) {
    const reader = new FileReader();
    reader.onload = function (e) {
      try {
        const data = JSON.parse(e.target.result);

        let imported = [];
        if (Array.isArray(data)) {imported = data;} else
        if (Array.isArray(data.tickets)) {imported = data.tickets;} else
        if (Array.isArray(data.days)) {data.days.forEach(function (day) {(day.tickets || []).forEach(function (t) {imported.push(t);});});} else
        {Object.keys(data).forEach(function (k) {if (k.charAt(0) !== '_' && Array.isArray(data[k])) data[k].forEach(function (t) {imported.push(t);});});}
        if (!imported.length) throw new Error('No tickets found');
        setPreview({ count: imported.length, by: data.exportedBy, tickets: imported });
      } catch (err) {showToast('Invalid JSON: ' + err.message, 'error');}
    };reader.readAsText(file);
  }
  function confirmImport() {
    if (!preview) return;
    // Dedup strictly by ticket number — IDs differ between exports so num is the only reliable key
    const existingNums = new Set(tickets.map(function (t) {return String(t.num || '');}));
    // For existing tickets, update status/note/resp/category if incoming has newer data
    const incomingByNum = {};
    preview.tickets.forEach(function (t) {if (t.num) incomingByNum[String(t.num)] = t;});
    const updated = [];
    const updatedNums = new Set();
    tickets.forEach(function (t) {
      const inc = incomingByNum[String(t.num || '')];
      if (inc) {
        updatedNums.add(String(t.num));
        updated.push(Object.assign({}, t, {
          status: inc.status || t.status,
          note: inc.note || t.note,
          resp: inc.resp || t.resp,
          category: inc.category || t.category,
          issue: inc.issue || t.issue,
          agent: inc.agent || t.agent,
          day: inc.day || t.day,
          updatedAt: inc.updatedAt || t.updatedAt
        }));
      } else {
        updated.push(t);
      }
    });
    const brandNew = preview.tickets.filter(function (t) {return !existingNums.has(String(t.num || ''));});
    const merged = [...updated, ...brandNew];
    // Write to shared global store so all agents see imported tickets

function ProfilePhotos({ showToast }) {

  });
  const fileRefs = useRef({});

  function handleFile(agentId, e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {showToast('Image too large (max 2MB)', '#DC2626');return;}
    const reader = new FileReader();
    reader.onload = function (ev) {
      const dataUrl = ev.target.result;
      setPhotos((prev) => {
        const next = { ...prev, [agentId]: dataUrl };
        try {
          localStorage.setItem('ek_photos_v2', JSON.stringify(next));
          window.EK_PHOTOS = Object.assign(window.EK_PHOTOS || {}, next);
        } catch (err) {}
        return next;
      });
      showToast('Photo updated! Reload app to see changes everywhere.', '#10B981');
    };
    reader.readAsDataURL(file);
  }

  function removePhoto(agentId) {
    setPhotos((prev) => {
      const next = { ...prev };
      delete next[agentId];
      try {
        localStorage.setItem('ek_photos_v2', JSON.stringify(next));
        if (window.EK_PHOTOS) delete window.EK_PHOTOS[agentId];
      } catch (err) {}
      return next;
    });

    <div style={{ padding: '24px 20px', maxWidth: 600, margin: '0 auto' }}>

  async function pullNow() {
    if (!pullUrl) {showToast('Set your Pull URL first', 'error');return;}
    setSaving(true);setStatus({ msg: 'Pulling from SharePoint via Power Automate…', ok: true });
    try {
      const res = await fetch(pullUrl, { method: 'POST' });
      if (!res.ok) throw new Error('HTTP ' + res.status + ' — check your Pull URL');
      const cloud1 = await res.json();

      // Normalise {manager:[...]} format from Pull All Tickets flow
      var normalized1 = {};
      if (Array.isArray(cloud1.manager)) {
        // Pull All returns {manager:[tickets]} — assign each ticket correct agent from AssignedTo field
        var flatAll = cloud1.manager.map(function (t) {
          var spStatus = t.status || t.Status || '';
          return Object.assign({}, t, {
            id: t.id || 'tk_mgr_' + t.num,
            agent: t.agent || 'manager',
            issue: t.issue || t.description || t.Description || t.note || '',
            status: function (s) {s = s || '';return s === 'Closed' || s === 'Resolved' ? 'resolved' : s === 'Assigned' || s === 'In Progress' || s === 'progress' ? 'progress' : 'unresolved';}(spStatus)
          });
        });
        normalized1 = { manager: flatAll };
      } else if (Array.isArray(cloud1.days)) {
        var flatTickets = [];
        cloud1.days.forEach(function (day) {
          (day.tickets || []).forEach(function (t) {
            flatTickets.push({
              id: t.id || 'tk_' + t.num,
              num: t.num || '',
              created: t.created || t.received || t.receivedAt || t.createdAt || t.date || t.Date || t.dateCreated || t.receivedDate || t.Created || t.timestamp || '',
              time: t.time || '',
              name: t.name || '',
              phone: (t.phone || '').replace(/^\+234/, '0'),
              meter: t.meter || '',
              addr: t.address || t.addr || '',
              bu: t.bu || '',
              issue: t.note || t.title || '',
              resp: t.assignee || '',
              category: t.category && t.subcategory ? t.category + ' — ' + t.subcategory : t.category || '',
              status: function (s) {s = s || '';return s === 'Closed' ? 'resolved' : s === 'Resolved' ? 'resolved' : s === 'Assigned' ? 'progress' : s === 'In Progress' ? 'progress' : s === 'Pending' ? 'unresolved' : 'unresolved';}(t.status || t.Status || ''),
              note: t.resolutionNote || '',
              agent: 'manager',
              day: day.dayNum || new Date().getDate()
            });
          });
        });
        normalized1 = { manager: flatTickets };
      } else {
        normalized1 = cloud1;
      }

      var cloud = Object.assign({}, normalized1);

      // If response uses 'agent' key (pull_today flow), remap to signed-in agent's id
      if (Array.isArray(cloud.agent) && !cloud[agent.id]) {
        cloud[agent.id] = cloud.agent.map(function (t) {
          return Object.assign({}, t, {
            agent: agent.id,
            id: t.id || 'tk_' + agent.id + '_' + t.num,
            status: function (s) {return s === 'Pending' ? 'unresolved' : s === 'Resolved' ? 'resolved' : s === 'In Progress' ? 'progress' : (s || 'unresolved').toLowerCase();}(t.status || t.Status || '')
          });
        });
        delete cloud.agent;
      }

      // Persist shifts / schedule / guide to localStorage (App polls every 5 s)
      if (cloud._shifts && typeof cloud._shifts === 'object') {
        try {localStorage.setItem('ek_v2_shifts', JSON.stringify(cloud._shifts));} catch (e) {}
      }
      if (cloud._sched && typeof cloud._sched === 'object') {
        Object.keys(cloud._sched).forEach(function (agId) {
          const agSched = cloud._sched[agId];
          if (typeof agSched === 'object') {
            Object.keys(agSched).forEach(function (dateStr) {
              localStorage.setItem('ek_sched_' + agId + '_' + dateStr, agSched[dateStr]);
            });
          }
        });
      }
      if (Array.isArray(cloud._guide) && cloud._guide.length) {try {localStorage.setItem('ek_guide', JSON.stringify(cloud._guide));} catch (e) {}}

      // Merge all agent ticket arrays into one shared pool using dedupTickets
      var merged = tickets.slice();
      var added = 0;
      Object.keys(cloud).forEach(function (agId) {
        if (agId.charAt(0) === '_') return;
        if (!Array.isArray(cloud[agId])) return;
        // Ensure every pulled ticket has 'created' for month-grouping
        var normalised = cloud[agId].map(function (t) {
          if (t.created) return t;
          var d = t.received || t.receivedAt || t.createdAt || t.date || t.Date || t.dateCreated || t.receivedDate || t.Created || t.timestamp || '';
          return d ? Object.assign({}, t, { created: d }) : t;
        });
        // Log-only mode: never overwrite existing ticket status/note — only add brand new tickets
        var existingNums = new Set(merged.map(function (x) {return _norm(x.num || '');}));
        var existingIds = new Set(merged.map(function (x) {return x.id || '';}));
        normalised.forEach(function (t) {
          var n = _norm(t.num || '');
          if (n && existingNums.has(n) || t.id && existingIds.has(t.id)) return;
          merged.push(t);if (n) existingNums.add(n);if (t.id) existingIds.add(t.id);added++;
        });
      });
      function persistTickets(tix) {try {localStorage.setItem('ek_v2_tickets', JSON.stringify(tix));} catch (e) {console.warn('persistTickets failed', e);}}
      persistTickets(merged);setTickets(merged);

      const now = new Date().toLocaleString('en-GB', { timeZone: 'Africa/Lagos' });
      setLastSync(now);localStorage.setItem('ek_last_sync', now);setPreview(cloud);
      const msg = '✅ Pulled ' + added + ' new tickets from SharePoint.';
      setStatus({ msg, ok: true });showToast(msg);
    } catch (e) {setStatus({ msg: 'Pull failed: ' + e.message, ok: false });showToast('Pull failed', 'error');} finally
    {setSaving(false);}
  }

  async function pushNow() {
    if (!pushUrl) {showToast('Set your Push URL first', 'error');return;}
    setSaving(true);setStatus({ msg: 'Pushing to SharePoint via Power Automate…', ok: true });
    try {
      const watNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
      const todayStr = watNow.getFullYear() + '-' + String(watNow.getMonth() + 1).padStart(2, '0') + '-' + String(watNow.getDate()).padStart(2, '0');
      const todayTix = tickets.filter(function (t) {return !t._baseline && inDutyWindow(t, agentShift);});
      function toSpStatus(s) {return s === 'resolved' ? 'Closed' : s === 'progress' ? 'Assigned' : 'Pending';}
      const mappedTix = todayTix.map(function (t) {return Object.assign({}, t, { spStatus: toSpStatus(t.status) });});
      const payload = { agentId: agent.id, agentName: agent.name, date: todayStr, tickets: mappedTix, pushedAt: new Date().toISOString() };
      const res = await fetch(pushUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status + ' — check your Push URL');
      const now = new Date().toLocaleString('en-GB', { timeZone: 'Africa/Lagos' });
      setLastSync(now);localStorage.setItem('ek_last_sync', now);
      const msg = '✅ Pushed ' + todayTix.length + ' tickets to SharePoint.';
      setStatus({ msg, ok: true });showToast(msg);
    } catch (e) {setStatus({ msg: 'Push failed: ' + e.message, ok: false });showToast('Push failed', 'error');} finally
    {setSaving(false);}
  }

  return (
    <div>
      <div className="topbar"><div><div className="eyebrow">CLOUD SYNC</div><div className="page-title">☁ Cloud Sync — SharePoint via Power Automate</div></div></div>
      <div className="pad">

        {/* ── Pull URL setup (shown when not yet saved) ── */}
        {!pullUrl &&
        <div style={{ background: 'rgba(255,199,44,.06)', border: '1.5px solid rgba(255,199,44,.4)', borderRadius: 12, padding: 16, marginBottom: 14 }}>
            <div style={{ font: '800 14px Sora,sans-serif', color: 'var(--text)', marginBottom: 6 }}>🔗 Set Power Automate Pull URL</div>
            <div style={{ font: '600 12px/1.6 Sora,sans-serif', color: 'var(--muted)', marginBottom: 12 }}>In Power Automate, create an <b style={{ color: 'var(--text)' }}>HTTP request trigger</b> flow that reads your SharePoint ticket list and returns JSON. Paste the flow URL below — it stays on this device only.</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8 }}>
              <input className="inp" type="text" value={pullDraft} onChange={function (e) {setPullDraft(e.target.value);}} placeholder="https://prod-xx.westeurope.logic.azure.com/…" />
              <button onClick={savePullUrl} style={{ padding: '8px 14px', background: '#16A34A', color: '#fff', border: 'none', borderRadius: 8, font: '800 12px Sora,sans-serif', cursor: 'pointer' }}>✓ Save</button>
            </div>
          </div>
        }

        {/* ── Push URL setup (shown when not yet saved) ── */}
        {!pushUrl &&
        <div style={{ background: 'rgba(99,102,241,.06)', border: '1.5px solid rgba(99,102,241,.4)', borderRadius: 12, padding: 16, marginBottom: 14 }}>
            <div style={{ font: '800 14px Sora,sans-serif', color: 'var(--text)', marginBottom: 6 }}>🔗 Set Power Automate Push URL</div>
            <div style={{ font: '600 12px/1.6 Sora,sans-serif', color: 'var(--muted)', marginBottom: 12 }}>Create a second <b style={{ color: 'var(--text)' }}>HTTP request trigger</b> flow that accepts a POST body with agent ticket data and writes it to your SharePoint list. Paste the URL below.</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8 }}>
              <input className="inp" type="text" value={pushDraft} onChange={function (e) {setPushDraft(e.target.value);}} placeholder="https://prod-xx.westeurope.logic.azure.com/…" />
              <button onClick={savePushUrl} style={{ padding: '8px 14px', background: '#1D4ED8', color: '#fff', border: 'none', borderRadius: 8, font: '800 12px Sora,sans-serif', cursor: 'pointer' }}>✓ Save</button>
            </div>
          </div>
        }

        {status.msg && <div style={{ padding: '11px 14px', borderRadius: 10, background: status.ok ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)', border: '1px solid ' + (status.ok ? 'rgba(34,197,94,.3)' : 'rgba(239,68,68,.3)'), font: '600 12px Sora,sans-serif', color: status.ok ? 'var(--okb)' : 'var(--bdb)', marginBottom: 12 }}>{status.msg}</div>}
        {preview && <div style={{ padding: '10px 12px', borderRadius: 8, background: 'rgba(255,255,255,.04)', border: '1px solid var(--bsoft)', font: '600 11px/1.4 JetBrains Mono,monospace', color: 'var(--muted)', marginBottom: 12 }}>☁ SharePoint: {Object.entries(preview).filter(function ([k]) {return k.charAt(0) !== '_';}).map(function ([k, v]) {return k + ': ' + (Array.isArray(v) ? v.length : 0);}).join(' · ')}</div>}

        {/* ── Pull / Push buttons ── */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
          <button onClick={pullNow} disabled={saving || !pullUrl} style={{ padding: '20px', background: saving || !pullUrl ? 'rgba(255,255,255,.06)' : '#16A34A', color: '#fff', border: 'none', borderRadius: 11, font: '800 14px Sora,sans-serif', cursor: saving || !pullUrl ? 'not-allowed' : 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, opacity: saving || !pullUrl ? .55 : 1 }}>
            <span style={{ fontSize: 24 }}>⬇</span><span>Pull from SharePoint</span>
            <small style={{ fontWeight: 500, fontSize: 11, opacity: .8 }}>{!pullUrl ? 'Set Pull URL first' : 'Get everyone\'s latest'}</small>
          </button>
          <button onClick={pushNow} disabled={saving || !pushUrl} style={{ padding: '20px', background: saving || !pushUrl ? 'rgba(255,255,255,.06)' : '#1D4ED8', color: '#fff', border: 'none', borderRadius: 11, font: '800 14px Sora,sans-serif', cursor: saving || !pushUrl ? 'not-allowed' : 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, opacity: saving || !pushUrl ? .55 : 1 }}>
            <span style={{ fontSize: 24 }}>⬆</span><span>Push to SharePoint</span>

          </button>
        </div>

        {lastSync && <div style={{ font: '500 11px Sora,sans-serif', color: 'var(--muted)', marginBottom: 10 }}>Last synced: <b style={{ color: 'var(--okb)' }}>{lastSync}</b></div>}

        {/* ── URL management (shown when at least one URL is saved) ── */}
        {(pullUrl || pushUrl) &&
        <div style={{ marginTop: 12, borderTop: '1px solid var(--bsoft)', paddingTop: 12 }}>
            <div style={{ font: '700 9px Sora,sans-serif', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.1em', marginBottom: 8 }}>Manage URLs</div>
            {pullUrl &&
          <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8, marginBottom: 8, alignItems: 'center' }}>
                <input className="inp" type="text" value={pullDraft} onChange={function (e) {setPullDraft(e.target.value);}} placeholder={'Pull: ' + pullUrl.slice(0, 42) + '…'} style={{ fontSize: 10 }} />
                <button onClick={savePullUrl} style={{ padding: '7px 11px', background: '#16A34A', color: '#fff', border: 'none', borderRadius: 7, font: '800 11px Sora,sans-serif', cursor: 'pointer' }}>✓ Update</button>
              </div>

            {pushUrl &&
          <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8, marginBottom: 8, alignItems: 'center' }}>
                <input className="inp" type="text" value={pushDraft} onChange={function (e) {setPushDraft(e.target.value);}} placeholder={'Push: ' + pushUrl.slice(0, 42) + '…'} style={{ fontSize: 10 }} />
                <button onClick={savePushUrl} style={{ padding: '7px 11px', background: '#1D4ED8', color: '#fff', border: 'none', borderRadius: 7, font: '800 11px Sora,sans-serif', cursor: 'pointer' }}>✓ Update</button>
              </div>
          }
            <button onClick={clearUrls} style={{ padding: '7px 14px', background: 'rgba(239,68,68,.12)', color: '#EF4444', border: '1px solid rgba(239,68,68,.3)', borderRadius: 7, font: '700 11px Sora,sans-serif', cursor: 'pointer' }}>✕ Clear all URLs</button>

}

              <div style={{ font: '500 10px/1.4 Sora,sans-serif', color: 'var(--muted)', marginBottom: 10, background: 'rgba(99,102,241,.06)', border: '1px solid rgba(99,102,241,.15)', borderRadius: 6, padding: '6px 10px' }}>⏱ {fmtDutyWindow(agentShift)}</div>

function getAutoTheme() {
  var h = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' })).getHours();
  if (h >= 6 && h < 12) return 'bright'; // morning
  if (h >= 12 && h < 17) return 'solar'; // afternoon
  if (h >= 17 && h < 22) return 'green'; // evening
  return 'night'; // late night
}

function AgentSettings({ agent, tickets, setTickets, showToast }) {
  function onDedup() {
    var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
    var seen = new Set();
    var deduped = all.filter(function (t) {
      var n = _norm(t.num || '');
      // Tickets WITH number: key = num; WITHOUT: key = name+phone+date (catches paste duplicates)
      var key = n ? n : _norm(t.name || '') + '|' + _norm(t.phone || '') + '|' + (t.created || t.loggedAt || '').slice(0, 10);
      if (!key || key === '||') return true;
      if (seen.has(key)) return false;
      seen.add(key);return true;
    });
    var removed = all.length - deduped.length;
    if (!removed) {showToast('No duplicates found ✓');return;}
    if (!window.confirm('Remove ' + removed + ' duplicate ticket' + (removed > 1 ? 's' : '') + ' from the shared store? This cannot be undone.')) return;
    localStorage.setItem('ek_v2_tickets', JSON.stringify(deduped));
    setTickets(deduped.filter(function (t) {return t.agent === agent.id || t.agentId === agent.id;}));
    showToast('🧹 Removed ' + removed + ' duplicate' + (removed > 1 ? 's' : '') + ' ✅');
  }
  function onPurge() {
    if (!window.confirm('Delete ALL tickets dated before May 1 2026 (test data)? This cannot be undone.')) return;
    var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
    var kept = all.filter(function (t) {var d = t.loggedAt || t.created || '';return d ? d >= '2026-05-01' : true;});
    var removed = all.length - kept.length;
    localStorage.setItem('ek_v2_tickets', JSON.stringify(kept));
    setTickets(kept.filter(function (t) {return t.agent === agent.id || t.agentId === agent.id;}));
    showToast('🗑 Purged ' + removed + ' pre-May test ticket' + (removed !== 1 ? 's' : '') + ' ✅');
  }
  return (
    <div>
      <div className="topbar">
        <div><div className="eyebrow">SETTINGS</div><div className="page-title">Data Management</div></div>
        <LiveClock />
      </div>
      <div className="pad">
        <div style={{ maxWidth: 420 }}>
          <div style={{ font: '700 11px Sora,sans-serif', color: 'var(--muted)', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: 12 }}>Data Cleanup</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <button className="btn" onClick={onDedup} style={{ padding: '14px 18px', background: 'rgba(59,130,246,.12)', border: '1px solid rgba(59,130,246,.3)', color: '#93C5FD', borderRadius: 10, font: '700 13px Sora,sans-serif', cursor: 'pointer', textAlign: 'left', display: 'flex', flexDirection: 'column', gap: 4 }}>
              <span>🧹 Remove Duplicate Tickets</span>
              <span style={{ font: '500 11px Sora,sans-serif', color: 'var(--muted)' }}>Scans all agents' tickets and removes entries with the same ticket number</span>
            </button>
            <button className="btn" onClick={onPurge} style={{ padding: '14px 18px', background: 'rgba(239,68,68,.1)', border: '1px solid rgba(239,68,68,.3)', color: '#FCA5A5', borderRadius: 10, font: '700 13px Sora,sans-serif', cursor: 'pointer', textAlign: 'left', display: 'flex', flexDirection: 'column', gap: 4 }}>
              <span>🗑 Purge Pre-May 2026 Test Data</span>
              <span style={{ font: '500 11px Sora,sans-serif', color: 'var(--muted)' }}>Permanently deletes all tickets dated before May 1 2026</span>
            </button>
          </div>
          <div style={{ marginTop: 16, padding: '10px 14px', background: 'rgba(255,199,44,.06)', border: '1px solid rgba(255,199,44,.18)', borderRadius: 8, font: '500 10px/1.6 Sora,sans-serif', color: 'var(--muted)' }}>
            ⚠ These actions affect the shared store and cannot be undone. Changes are visible to all agents immediately.
          </div>
        </div>
      </div>
    </div>);

}

// ── SHIFT CALENDAR SCREEN (read-only + CSV import fallback) ────────────────
function ShiftCalendarScreen({ shifts }) {
  const [tick, setTick] = React.useState(0);
  const [calOff, setCalOff] = React.useState(0);
  const [importing, setImporting] = React.useState(false);
  const [importMsg, setImportMsg] = React.useState('');
  const fileRef = React.useRef();

  React.useEffect(function() {
    function up(){setTick(function(n){return n+1;});}
    window.addEventListener('ek_sched_updated',up);window.addEventListener('storage',up);
    return function(){window.removeEventListener('ek_sched_updated',up);window.removeEventListener('storage',up);};
  },[]);

  var watNow=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
  var calBase=new Date(watNow.getFullYear(),watNow.getMonth()+calOff,1);
  var yr=calBase.getFullYear(),mo=calBase.getMonth();
  var monthLabel=calBase.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  var daysInMo=new Date(yr,mo+1,0).getDate();
  var firstDow=new Date(yr,mo,1).getDay();
  var todayStr=watNow.getFullYear()+'-'+String(watNow.getMonth()+1).padStart(2,'0')+'-'+String(watNow.getDate()).padStart(2,'0');
  var isCurrentMonth=calOff===0;
  var SH_META={day:{emoji:'🌞',label:'Day',color:'#FCD34D'},shadow:{emoji:'🌙',label:'Night',color:'#818CF8'},night:{emoji:'🌙',label:'Night',color:'#818CF8'},leave:{emoji:'⛱️',label:'Leave',color:'#34D399'},off:{emoji:'',label:'Off',color:'rgba(148,163,184,.4)'}};
  function gs(agentId,dateStr){return localStorage.getItem('ek_sched_'+agentId+'_'+dateStr)||shifts[agentId]||'off';}

  var cells=[];for(var li=0;li<firstDow;li++)cells.push(null);
  for(var di=1;di<=daysInMo;di++){cells.push(yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(di).padStart(2,'0'));}
  while(cells.length%7!==0)cells.push(null);

  function handleCSV(e) {
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var lines=ev.target.result.split(/\r?\n/).filter(Boolean);
        var count=0;
        lines.forEach(function(line){
          var parts=line.split(',');
          if(parts.length<3)return;
          var agentId=parts[0].trim().toLowerCase();
          var dateStr=parts[1].trim();
          var shift=parts[2].trim().toLowerCase();
          if(!agentId||!dateStr||!shift)return;
          if(!/^\d{4}-\d{2}-\d{2}$/.test(dateStr))return;
          localStorage.setItem('ek_sched_'+agentId+'_'+dateStr,shift);
          count++;
        });
        window.dispatchEvent(new Event('ek_sched_updated'));
        setImportMsg('✅ Imported '+count+' schedule entries.');
        setTick(function(n){return n+1;});
      }catch(err){setImportMsg('❌ Error: '+err.message);}
    };
    reader.readAsText(file);
    e.target.value='';
  }

  var SUN_HDR=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return (
    <div>
      <div className="hero" style={{padding:'14px 28px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div>
            <div style={{font:'800 18px/1 Sora,sans-serif',color:'#fff',marginBottom:4}}>📅 Shift Calendar</div>
            <div style={{font:'500 11px Sora,sans-serif',color:'var(--muted)'}}>Read-only · Synced from Managers Hub</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={handleCSV}/>
            <button className="btn btn-sm" onClick={function(){fileRef.current&&fileRef.current.click();}} style={{background:'rgba(99,102,241,.18)',borderColor:'rgba(99,102,241,.4)',color:'#A5B4FC',fontWeight:700}}>📥 Import CSV</button>
            <span style={{font:'600 9px Sora,sans-serif',color:'var(--sub)'}}>fallback if sync fails</span>
          </div>
        </div>
        {importMsg&&<div style={{marginTop:8,font:'600 11px Sora,sans-serif',color:importMsg.startsWith('✅')?'#4ADE80':'#F87171'}}>{importMsg}</div>}
      </div>

      <div style={{padding:'16px 28px 24px'}}>
        <div className="card" style={{padding:0}}>
          <div className="card-head" style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
            <h3>📅 {monthLabel}</h3>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              {['day','shadow','leave','off'].map(function(k){var m=SH_META[k];return(<span key={k} style={{display:'flex',alignItems:'center',gap:3,font:'600 9px Sora,sans-serif',color:m.color}}>{k==='off'?<span style={{width:7,height:7,borderRadius:'50%',background:'rgba(148,163,184,.5)',display:'inline-block'}}/>:m.emoji} {m.label}</span>);})}
              <div style={{width:1,height:16,background:'var(--bsoft)',margin:'0 4px'}}/>
              <button className="btn btn-sm" onClick={function(){setCalOff(function(o){return o-1;})}} style={{padding:'4px 10px',fontSize:12}}>←</button>
              <button className="btn btn-sm" onClick={function(){setCalOff(0)}} style={{padding:'4px 10px',fontSize:11,background:isCurrentMonth?'var(--ek-gold)':'',color:isCurrentMonth?'#000':''}}>Today</button>
              <button className="btn btn-sm" onClick={function(){setCalOff(function(o){return o+1;})}} style={{padding:'4px 10px',fontSize:12}}>→</button>
            </div>
          </div>
          <div style={{padding:'12px 14px 16px'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6,marginBottom:6}}>
              {SUN_HDR.map(function(d){return(<div key={d} style={{textAlign:'center',font:'700 9px/1 Sora,sans-serif',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',padding:'2px 0'}}>{d}</div>);})}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6}}>
              {cells.map(function(ds,ci){
                if(!ds)return<div key={'b'+ci} style={{minHeight:90,borderRadius:8,background:'rgba(255,255,255,.015)'}}/>;
                var dayNum=parseInt(ds.slice(8));
                var isToday=ds===todayStr;

function App() {
  const [agent, setAgent] = useState(null);
  const [screen, setScreen] = useState('dashboard');
  const [navCollapsed, setNavCollapsed] = useState(false);
  const _agtnow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
  const currentYM = _agtnow.getFullYear() + '-' + String(_agtnow.getMonth() + 1).padStart(2, '0');
  const [activeMonth, setActiveMonth] = useState(function () {
    // Boot: pick latest month from stored tickets, fall back to currentYM
    var stored = [];try {stored = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');} catch (e) {}
    var max = '';stored.forEach(function (t) {var ym = shiftWatYM(t);if (ym && ym > max) max = ym;});
    return max || currentYM;
  });
  const [theme, setTheme] = useState(function () {
    const mode = localStorage.getItem('ek_theme_mode');
    if (!mode || mode === 'auto') return getAutoTheme();
    return mode;
  });
  const [tickets, setTicketsState] = useState([]);
  const [shifts, setShifts] = useState(() => loadShifts());
  const [editing, setEditing] = useState(null);
  const [toast, setToast] = useState(null);
  const [syncTick, setSyncTick] = useState(0);
  const toastRef = useRef(null);

  useEffect(function () {document.body.setAttribute('data-theme', theme);localStorage.setItem('ek_global_theme', theme);}, [theme]);
  // Auto theme: switch every minute when in auto mode
  useEffect(function () {
    const id = setInterval(function () {
      const mode = localStorage.getItem('ek_theme_mode');
      if (!mode || mode === 'auto') setTheme(getAutoTheme());
    }, 60000);
    return function () {clearInterval(id);};
  }, []);
  // Cross-tab sync: refresh when Managers Hub writes to ek_v2_tickets
  useEffect(function () {
    function onStorage(e) {if (e.key === 'ek_v2_tickets') setSyncTick(function (n) {return n + 1;});}
    window.addEventListener('storage', onStorage);
    // Poll every 15s as fallback (same-tab changes don't fire storage events)
    var poll = setInterval(function () {setSyncTick(function (n) {return n + 1;});}, 15000);
    return function () {window.removeEventListener('storage', onStorage);clearInterval(poll);};
  }, []);
  useEffect(function () {const id = setInterval(function () {setShifts(loadShifts());}, 5000);return function () {clearInterval(id);};}, []);
  // ── BACKGROUND SharePoint AUTO-PULL ─────────────────────────────────────────
  // Runs every 30 seconds regardless of which screen is open.
  // Silently merges new SharePoint tickets into the shared pool.
  // The existing 15s syncTick poll picks up the localStorage change automatically.
  useEffect(function () {
    var running = false;
    async function bgPull() {
      if (running) return;
      running = true;
      try {
        var result = await agCloudAutoPull();
        if (result && result.count > 0) {
          // New tickets landed — trigger syncTick so agent view refreshes
          setSyncTick(function (n) { return n + 1; });
        }
      } catch (e) {
        // Silent — background pull failures don't interrupt the agent
      } finally {
        running = false;
      }
    }
    var initTimer = setTimeout(bgPull, 2000);
    var interval = setInterval(bgPull, 30000);
    return function () { clearTimeout(initTimer); clearInterval(interval); };
  }, []); // eslint-disable-line
  // ─────────────────────────────────────────────────────────────────────────────
  // Re-load this agent's tickets whenever cross-tab sync fires (manager updates reflect in My Tickets)
  useEffect(function () {if (agent) setTicketsState(loadTix(agent.id));}, [syncTick]);

  // Load all tickets from shared global store (synced with Managers Hub)
  const allTix = function () {
    try {
      var raw = localStorage.getItem('ek_v2_tickets');
      if (raw) {var parsed = JSON.parse(raw);if (parsed.length > 0) return parsed;}
    } catch (e) {}
    // Fallback: aggregate from per-agent legacy stores
    var raw2 = AGENTS.reduce(function (acc, a) {return acc.concat(loadTix(a.id));}, []);
    var seen = {};return raw2.filter(function (t) {var k = (t.num || '').trim().toLowerCase() + '|' + (t.name || '').trim().toLowerCase();if (!k || k === '|') return true;if (seen[k]) return false;seen[k] = true;return true;});
  }();

  var _agtMonthSet = new Set();
  allTix.forEach(function (t) {var ym = shiftWatYM(t);if (ym) _agtMonthSet.add(ym);});
  _agtMonthSet.add(currentYM);
  var availMonths = Array.from(_agtMonthSet).sort();
  // Auto-snap to latest month whenever new ticket data arrives
  var _latestYM = function () {var max = '';allTix.forEach(function (t) {var ym = shiftWatYM(t);if (ym && ym > max) max = ym;});return max || currentYM;}();
  var _hasSnapped = React.useRef(false);
  React.useEffect(function () {
    if (_hasSnapped.current) return;
    _hasSnapped.current = true;
    setActiveMonth(_latestYM);
    localStorage.setItem('ek_active_month', _latestYM);
  }, [_latestYM]);
  var viewTix = allTix.filter(function (t) {return shiftWatYM(t) === activeMonth;});
  function setTickets(tix) {setTicketsState(tix);if (agent) saveTix(agent.id, tix);}
  function onSignIn(a) {
    setAgent(a);document.documentElement.style.setProperty('--agent', a.color);document.documentElement.style.setProperty('--agent-tint', a.tint);
    setTicketsState(loadTix(a.id));showToast('Welcome, ' + a.name.split(' ')[0] + ' ⚡');
  }
  function onSignOut() {setAgent(null);setScreen('dashboard');}
  function showToast(msg, type) {if (toastRef.current) clearTimeout(toastRef.current);setToast({ msg, type });toastRef.current = setTimeout(function () {setToast(null);}, 3000);}
  function onEdit(t) {setEditing(t);}
  // ── PA Push ──────────────────────────────────────────────
  function getPaUrl() {try {return localStorage.getItem('ek_pa_push_url') || '';} catch (e) {return '';}}
  function setPaUrl(url) {try {localStorage.setItem('ek_pa_push_url', url.trim());} catch (e) {}}

  function pushToSharePoint(t) {
    const url = getPaUrl();
    if (!url) return; // silent if not configured
    const body = {
      num: String(t.num || ''),
      status: t.status === 'resolved' ? 'RESOLVED' : t.status === 'progress' ? 'IN PROGRESS' : 'UNRESOLVED',
      responsible: t.resp || '',
      actionTaken: t.note || '',
      resolvedBy: t.status === 'resolved' ? t.resp || agent.name : '',
      resolvedDate: t.status === 'resolved' ? new Date().toISOString().slice(0, 10) : '',
      agentName: agent.name,
      updatedBy: agent.name
    };
    fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).
    then(function (r) {if (r.ok) showToast('✅ Synced to SharePoint', 'success');else showToast('⚠️ Sync failed (' + r.status + ')', 'warn');}).
    catch(function () {showToast('⚠️ Sync failed — check PA URL', 'warn');});
  }
  // ─────────────────────────────────────────────────────────

  function onSave(t) {setTickets(tickets.map(function (x) {return x.id === t.id ? t : x;}));setEditing(null);pushToSharePoint(t);showToast('Ticket updated.');}
  function onDelete(t) {setTickets(tickets.filter(function (x) {return x.id !== t.id;}));setEditing(null);showToast('Deleted.');}
  function onCreate(t) {
    const arr = Array.isArray(t) ? t : [t];
    const r = dedupTickets(tickets, arr);
    const u = [...r.merged, ...r.kept];
    setTickets(u);
    if (r.dropped > 0) showToast('Added ' + r.kept.length + ' · ' + r.dropped + ' duplicate' + (r.dropped > 1 ? 's' : '') + ' skipped', 'warn');else
    showToast('Ticket' + (r.kept.length > 1 ? 's' : ' #' + (r.kept[0] || {}).num) + ' saved!');
    setScreen('tickets');
  }
  function onUpdateAllTix(updated) {
    // Update in global shared store
    try {
      var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
      var found = all.some(function (t) {return t.id === updated.id;});
      var next = found ? all.map(function (t) {return t.id === updated.id ? updated : t;}) : all.concat([updated]);
      localStorage.setItem('ek_v2_tickets', JSON.stringify(next));
    } catch (e) {}
    // Update agent-local state if it's their ticket
    if (tickets.some(function (t) {return t.id === updated.id;})) {
      setTickets(tickets.map(function (t) {return t.id === updated.id ? updated : t;}));
    }
    setSyncTick(function (n) {return n + 1;});
    pushToSharePoint(updated);
    showToast('Ticket #' + updated.num + ' updated.');
  }
  function onDeleteAllTix(id) {
    // Delete from global store
    try {
      var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
      localStorage.setItem('ek_v2_tickets', JSON.stringify(all.filter(function (t) {return t.id !== id;})));
    } catch (e) {}
    setTickets(tickets.filter(function (t) {return t.id !== id;}));
    setSyncTick(function (n) {return n + 1;});
    showToast('Ticket deleted.');
  }
  function onDeleteBulkAllTix(ids) {
    var idSet = new Set(ids);
    try {
      var all = JSON.parse(localStorage.getItem('ek_v2_tickets') || '[]');
      localStorage.setItem('ek_v2_tickets', JSON.stringify(all.filter(function (t) {return !idSet.has(t.id);})));
    } catch (e) {}
    setTickets(tickets.filter(function (t) {return !idSet.has(t.id);}));
    setSyncTick(function (n) {return n + 1;});
  }

  if (!agent) return <Signin onSignIn={onSignIn} />;

  const agentShift = shifts[agent.id] || 'day';
  const screens = {
    dashboard: <Dashboard agent={agent} allTix={viewTix} shifts={shifts} activeMonth={activeMonth} />,
    all: <AllComplaints agent={agent} allTix={viewTix} onUpdate={onUpdateAllTix} onDelete={onDeleteAllTix} onDeleteBulk={onDeleteBulkAllTix} showToast={showToast} />,
    tickets: <TicketsScreen agent={agent} tickets={tickets} allTix={viewTix} onEdit={onEdit} onUpdate={onUpdateAllTix} onDelete={onDeleteAllTix} showToast={showToast} agentShift={agentShift} onCreate={onCreate} />,
    slot: <SlotReport agent={agent} tickets={tickets} showToast={showToast} agentShift={agentShift} />,
    guide: <SupportGuide agent={agent} showToast={showToast} />,
    photos: <ProfilePhotos showToast={showToast} />,
    data: <DataScreen agent={agent} tickets={allTix} setTickets={setTickets} showToast={showToast} agentShift={agentShift} />,
    sync: <CloudSync agent={agent} tickets={tickets} setTickets={setTickets} showToast={showToast} agentShift={agentShift} />,
    settings: <AgentSettings agent={agent} tickets={tickets} setTickets={setTickets} showToast={showToast} />,
    roster: <TeamRoster allTix={viewTix} shifts={shifts} />,
    calendar: <ShiftCalendarScreen shifts={shifts} />
  };

          <div className="nav-user">
            <Av agent={agent} size={30} />
            <div><div className="nav-user-info">Signed in as</div><div className="nav-user-name">{agent.name.split(' ')[0]}</div></div>
          </div>
        </div>
        <div className="nav-mon" style={{ padding: '8px 12px', borderBottom: '1px solid rgba(42,64,153,.4)' }}>
          <div style={{ font: '700 8px/1 Sora,sans-serif', color: 'rgba(255,255,255,.25)', textTransform: 'uppercase', letterSpacing: '.14em', marginBottom: 6 }}>MONTH</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3, maxHeight: 140, overflowY: 'auto' }}>
            {availMonths.map(function (ym) {
              var on = activeMonth === ym;
              var isCur = ym === currentYM;
              var parts = ym.split('-');
              var label = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, 1).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
              var pending = allTix.filter(function (t) {return shiftWatYM(t) === ym && t.status !== 'resolved';}).length;
              var acBorder = isCur ? '#22C55E' : 'rgba(227,6,19,.6)';
              var acBg = isCur ? 'rgba(34,197,94,.1)' : 'rgba(227,6,19,.1)';
              return (
                <button key={ym} onClick={function () {setActiveMonth(ym);localStorage.setItem('ek_active_month', ym);}}
                style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 9px', borderRadius: 7, border: '1px solid ' + (on ? acBorder : 'rgba(42,64,153,.5)'), background: on ? acBg : 'transparent', color: on ? '#fff' : 'rgba(255,255,255,.35)', font: '600 11px/1 Sora,sans-serif', cursor: 'pointer', transition: 'all .15s' }}>
                  <span style={{ color: "rgb(4, 109, 208)" }}>{label}</span>
                  <span style={{ fontSize: 8, padding: '2px 6px', borderRadius: 8, background: on ? isCur ? 'rgba(34,197,94,.2)' : 'rgba(227,6,19,.2)' : 'rgba(255,255,255,.06)', color: isCur ? '#4ADE80' : pending > 0 ? '#FCD34D' : 'rgba(255,255,255,.3)', fontWeight: 700, letterSpacing: '.06em', whiteSpace: 'nowrap' }}>
                    {isCur ? 'LIVE' : pending > 0 ? pending + 'p' : '✓'}
                  </span>
                </button>);

            })}
          </div>
        </div>
        <div className="nav-body">
          {NAV.map(function (n) {return (
              <button key={n.id} className={'nav-item' + (screen === n.id ? ' on' : '')} onClick={function () {setScreen(n.id);}}>
              <span style={{ fontSize: 13, flexShrink: 0 }}>{n.icon}</span>
              <span>{n.label}</span>
            </button>);})}
        </div>
        <div className="nav-foot">
          <div className="theme-row">
            {THEMES.map(function (t) {return (
                <div key={t.id} className={'tdot' + (theme === t.id ? ' on' : '')} title={t.label}
                onClick={function () {const actual = t.id === 'auto' ? getAutoTheme() : t.id;setTheme(actual);localStorage.setItem('ek_theme_mode', t.id);}}
                style={{ background: t.sw, border: theme === t.id || localStorage.getItem('ek_theme_mode') === t.id ? '1.5px solid var(--ek-gold)' : '1.5px solid rgba(255,255,255,.15)' }} />);})}
          </div>
          <button className="signout" onClick={onSignOut}><span style={{ fontSize: 12 }}>↩</span>Sign out</button>
        </div>
      </nav>
      {/* MAIN */}
      <main className={'main' + (navCollapsed ? ' nc' : '')}>{screens[screen] || screens.dashboard}</main>
      {editing && <EditModal ticket={editing} agent={agent} onSave={onSave} onDelete={onDelete} onClose={function () {setEditing(null);}} />}
      {toast && <div className="toast" style={{ borderColor: toast.type === 'error' ? '#DC2626' : '#E30613' }}><span style={{ color: toast.type === 'error' ? '#F87171' : '#FFC72C' }}>⚡</span>{toast.msg}</div>}
    </div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
